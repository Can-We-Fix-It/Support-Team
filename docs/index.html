<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Team - Issue Tracking Dashboard</title>

<style>
/* ===== YOUR ORIGINAL CSS (UNCHANGED) ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
}

.container { max-width: 1200px; margin: 0 auto; }

header { text-align: center; color: white; margin-bottom: 40px; padding: 20px; }

h1 { font-size: 2.5em; margin-bottom: 10px; }

.subtitle { opacity: 0.9; }

.stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 15px;
    margin-bottom: 40px;
}

.stat-box {
    background: white;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
}

.stat-number { font-size: 2em; font-weight: bold; color: #667eea; }

.main-content {
    display: grid;
    grid-template-columns: 250px 1fr;
    gap: 25px;
}

.team-members {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    position: sticky;
    top: 20px;
}

.team-header {
    background: linear-gradient(135deg,#667eea,#764ba2);
    color: white;
    padding: 20px;
    text-align: center;
}

.member-item {
    padding: 15px;
    border-bottom: 1px solid #eee;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
}

.member-item:hover { background: #f5f5f5; }

.member-item.active { background: #667eea; color: white; }

.member-badge {
    background: #667eea;
    color: white;
    border-radius: 50%;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.member-item.active .member-badge {
    background: white;
    color: #667eea;
}

.milestones {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 25px;
}

.milestone-card {
    background: white;
    border-radius: 12px;
    overflow: hidden;
}

.milestone-header {
    padding: 20px;
    color: white;
}

.progress-bar {
    height: 8px;
    background: rgba(255,255,255,0.3);
    border-radius: 10px;
}

.progress-fill {
    height: 100%;
    background: #4ade80;
}

.issue-item {
    padding: 12px;
    background: #f8f9fa;
    margin: 10px;
    border-radius: 8px;
}

.issue-title { font-weight: 500; }

.error { background:#fee;color:#c33;padding:10px;margin-bottom:10px; }

.loading { color:white;text-align:center; }
</style>
</head>

<body>
<div class="container">

<header>
    <h1>🎯 Support Team Dashboard</h1>
    <p class="subtitle">Track issues by team member and priority</p>
</header>

<div id="error"></div>
<div class="stats" id="stats"></div>

<div class="main-content">
    <div class="team-members">
        <div class="team-header">Team Members</div>
        <div id="teamMembers"></div>
    </div>

    <div class="milestones" id="milestones"></div>
</div>

</div>

<script>
const REPO_OWNER = 'Can-We-Fix-It';
const REPO_NAME = 'Support-Team';

let allMilestones = [];
let selectedMember = null;

/* =========================
   🔥 FIXED PRIORITY SYSTEM
========================= */
function getPriorityFromIssue(issue) {
    if (!issue.labels || !Array.isArray(issue.labels)) return null;

    const labels = issue.labels.map(l => l.name.toLowerCase());

    if (labels.some(l =>
        l.includes('severe') ||
        l.includes('p0') ||
        l.includes('p1') ||
        l.includes('high') ||
        l.includes('urgent')
    )) return 'Severe';

    if (labels.some(l =>
        l.includes('medium') ||
        l.includes('p2') ||
        l.includes('normal')
    )) return 'Medium';

    if (labels.some(l =>
        l.includes('low') ||
        l.includes('p3') ||
        l.includes('minor')
    )) return 'Low';

    return null;
}

/* ========================= */

function fetchMilestones() {
    return fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/milestones?state=all`)
        .then(r => r.json());
}

function fetchIssues(milestoneNumber) {
    return fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues?milestone=${milestoneNumber}&state=all`)
        .then(r => r.json());
}

async function fetchAndRender() {
    document.getElementById('milestones').innerHTML = '<div class="loading">Loading...</div>';

    const milestones = await fetchMilestones();

    const full = await Promise.all(
        milestones.map(async m => ({
            ...m,
            issues: await fetchIssues(m.number)
        }))
    );

    allMilestones = full;

    render(full);
}

function render(data) {

    let html = '';

    data.forEach(m => {

        let issuesHTML = '';
        let count = 0;

        m.issues.forEach(i => {
            const priority = getPriorityFromIssue(i);
            if (!priority) return;

            count++;

            issuesHTML += `
                <div class="issue-item">
                    <div class="issue-title">${i.title}</div>
                    <div>Priority: ${priority}</div>
                </div>
            `;
        });

        html += `
        <div class="milestone-card">
            <div class="milestone-header">
                <h3>${m.title}</h3>
                <div>${count} issues</div>
            </div>
            <div>${issuesHTML}</div>
        </div>
        `;
    });

    document.getElementById('milestones').innerHTML = html;
}

window.onload = fetchAndRender;
</script>

</body>
</html>
