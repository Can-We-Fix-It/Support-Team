<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Dashboard</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#667eea,#764ba2);
    margin:0;
    padding:20px;
    color:white;
}

.container { max-width:1200px; margin:auto; }

header { text-align:center; margin-bottom:20px; }

.stats {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:10px;
    margin-bottom:20px;
}

.stat-box {
    background:white;
    color:black;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

.main {
    display:grid;
    grid-template-columns:250px 1fr;
    gap:20px;
}

.sidebar {
    background:white;
    color:black;
    border-radius:10px;
    padding:10px;
    height:fit-content;
}

.card {
    background:white;
    color:black;
    border-radius:10px;
    margin-bottom:15px;
    padding:15px;
}

.issue {
    padding:10px;
    border-bottom:1px solid #eee;
}
</style>
</head>

<body>

<div class="container">
<header>
    <h1>🎯 Support Dashboard</h1>
</header>

<div class="stats" id="stats"></div>

<div class="main">
    <div class="sidebar" id="sidebar"></div>
    <div id="content"></div>
</div>
</div>

<script>
const OWNER = "Can-We-Fix-It";
const REPO = "Support-Team";

let milestonesData = [];

/* -------------------------
   SIMPLE FETCH (NO TOKEN)
------------------------- */
async function api(url) {
    const res = await fetch(url);
    if (!res.ok) throw new Error("GitHub API " + res.status);
    return res.json();
}

/* -------------------------
   PRIORITY DETECTION
------------------------- */
function priority(issue) {
    const labels = (issue.labels || []).map(l => l.name.toLowerCase());

    if (labels.some(l => l.includes("severe") || l.includes("p0"))) return "Severe";
    if (labels.some(l => l.includes("medium") || l.includes("p2"))) return "Medium";
    if (labels.some(l => l.includes("low") || l.includes("p3"))) return "Low";

    return "None";
}

/* -------------------------
   LOAD DATA
------------------------- */
async function load() {
    try {

        const milestones = await api(
            `https://api.github.com/repos/${OWNER}/${REPO}/milestones?state=all`
        );

        const full = [];

        for (let m of milestones) {
            const issues = await api(
                `https://api.github.com/repos/${OWNER}/${REPO}/issues?milestone=${m.number}&state=all`
            );

            full.push({ ...m, issues });
        }

        milestonesData = full;

        render(full);

    } catch (err) {
        document.getElementById("content").innerHTML =
            "<h3>Error: " + err.message + "</h3>";
    }
}

/* -------------------------
   RENDER
------------------------- */
function render(data) {

    let total = 0;
    let html = "";

    data.forEach(m => {

        total += m.issues.length;

        html += `
        <div class="card">
            <h3>${m.title}</h3>
        `;

        m.issues.forEach(i => {
            html += `
                <div class="issue">
                    <b>${i.title}</b><br>
                    Priority: ${priority(i)}
                </div>
            `;
        });

        html += `</div>`;
    });

    document.getElementById("content").innerHTML = html;

    document.getElementById("stats").innerHTML = `
        <div class="stat-box">
            <h2>${total}</h2>
            <p>Total Issues</p>
        </div>
    `;

    document.getElementById("sidebar").innerHTML =
        "<h3>Milestones</h3>" +
        data.map(m => `<div>• ${m.title}</div>`).join("");
}

/* ------------------------- */
load();
</script>

</body>
</html>
