<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Team - Issue Tracking Dashboard</title>

<style>
/* ===== YOUR STYLE KEPT (UNCHANGED STRUCTURE) ===== */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
}

.container { max-width: 1200px; margin: auto; }

header {
    text-align: center;
    color: white;
    margin-bottom: 40px;
}

h1 {
    font-size: 2.5em;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}

.subtitle { opacity: 0.9; }

.stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 15px;
    margin-bottom: 40px;
}

.stat-box {
    background: white;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
}

.stat-number {
    font-size: 2em;
    font-weight: bold;
    color: #667eea;
}

.main-content {
    display: grid;
    grid-template-columns: 250px 1fr;
    gap: 25px;
}

.team-members {
    background: white;
    border-radius: 12px;
    overflow: hidden;
}

.team-header {
    background: #667eea;
    color: white;
    padding: 15px;
    text-align: center;
    font-weight: bold;
}

.member-item {
    padding: 12px 15px;
    border-bottom: 1px solid #eee;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
}

.member-item:hover { background: #f5f5f5; }

.member-item.active {
    background: #667eea;
    color: white;
}

.member-badge {
    background: #667eea;
    color: white;
    border-radius: 50%;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
}

.milestones {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
}

.milestone-card {
    background: white;
    border-radius: 12px;
    overflow: hidden;
}

.milestone-header {
    background: #667eea;
    color: white;
    padding: 15px;
}

.issue-item {
    padding: 10px;
    border-bottom: 1px solid #eee;
}

.issue-title {
    font-weight: 500;
}

.issue-meta {
    font-size: 12px;
    color: #666;
    margin-top: 5px;
}

</style>
</head>

<body>

<div class="container">

<header>
    <h1>🎯 Support Dashboard</h1>
    <p class="subtitle">GitHub Issues by Agent & Priority</p>
</header>

<div class="stats" id="stats"></div>

<div class="main-content">

    <div class="team-members">
        <div class="team-header">👥 Agents</div>
        <div id="team"></div>
    </div>

    <div class="milestones" id="board"></div>

</div>

</div>

<script>
const REPO_OWNER = "Can-We-Fix-It";
const REPO_NAME = "Support-Team";

let allData = [];
let selectedAgent = null;

function getPriority(issue) {
    const labels = (issue.labels || []).map(l => l.name.toLowerCase());

    if (labels.some(l => l.includes("urgent"))) return "Urgent";
    if (labels.some(l => l.includes("high"))) return "High";
    if (labels.some(l => l.includes("medium"))) return "Medium";
    if (labels.some(l => l.includes("low"))) return "Low";

    return "None";
}

function getAgents(issue) {
    const priorities = ["urgent","high","medium","low"];

    return (issue.labels || [])
        .map(l => l.name)
        .filter(name => !priorities.some(p => name.toLowerCase().includes(p)));
}

async function fetchData() {
    const milestones = await fetch(
        `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/milestones?state=all`
    ).then(r => r.json());

    allData = await Promise.all(
        milestones.map(async m => ({
            ...m,
            issues: await fetch(
                `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues?milestone=${m.number}&state=all`
            ).then(r => r.json())
        }))
    );

    render();
}

function getAllAgents() {
    const set = new Set();

    allData.forEach(m => {
        m.issues.forEach(i => {
            getAgents(i).forEach(a => set.add(a));
        });
    });

    return [...set];
}

function render() {

    const agents = getAllAgents();

    // ===== AGENTS =====
    document.getElementById("team").innerHTML = agents.map(a => `
        <div class="member-item ${selectedAgent===a?"active":""}"
             onclick="selectAgent('${a}')">
            ${a}
            <div class="member-badge">
                ${allData.reduce((t,m)=>t+m.issues.filter(i=>getAgents(i).includes(a)).length,0)}
            </div>
        </div>
    `).join("");

    // ===== BOARD =====
    let html = "";

    allData.forEach(m => {

        let issues = m.issues;

        if (selectedAgent) {
            issues = issues.filter(i => getAgents(i).includes(selectedAgent));
        }

        html += `
        <div class="milestone-card">
            <div class="milestone-header">${m.title}</div>

            ${issues.map(i => `
                <div class="issue-item">
                    <div class="issue-title">${i.title}</div>
                    <div class="issue-meta">
                        Priority: ${getPriority(i)} |
                        Agents: ${getAgents(i).join(", ") || "None"}
                    </div>
                </div>
            `).join("") || "<div class='issue-item'>No issues</div>"}

        </div>`;
    });

    document.getElementById("board").innerHTML = html;
}

function selectAgent(a) {
    selectedAgent = selectedAgent === a ? null : a;
    render();
}

fetchData();
</script>

</body>
</html>
