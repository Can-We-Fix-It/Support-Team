<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Dashboard</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: linear-gradient(135deg,#667eea,#764ba2);
    min-height: 100vh;
    color: white;
}

.container { max-width:1200px; margin:auto; padding:20px; }

header { text-align:center; margin-bottom:20px; }

button {
    padding:10px 15px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.refresh-btn { background:white; color:#333; }

.grid {
    display:grid;
    grid-template-columns:250px 1fr;
    gap:20px;
}

.panel, .card {
    background:white;
    color:#333;
    border-radius:10px;
    padding:15px;
}

.issue {
    padding:10px;
    margin:10px 0;
    background:#f3f3f3;
    border-radius:8px;
}

.badge {
    padding:3px 8px;
    border-radius:12px;
    font-size:12px;
    color:white;
}

.low { background:green; }
.medium { background:orange; }
.high { background:red; }
.urgent { background:darkred; }

.agent {
    display:flex;
    justify-content:space-between;
    padding:10px;
    cursor:pointer;
    border-bottom:1px solid #eee;
}

.agent:hover { background:#f0f0f0; }
.active { background:#667eea; color:white; }

</style>
</head>

<body>
<div class="container">

<header>
<h1>Support Dashboard</h1>
<button class="refresh-btn" onclick="load()">Refresh</button>
</header>

<div class="grid">

<!-- LEFT -->
<div class="panel">
<h3>Agents</h3>
<div id="agents"></div>
</div>

<!-- RIGHT -->
<div class="panel">
<h3>Issues</h3>
<div id="issues"></div>
</div>

</div>
</div>

<script>
const OWNER = "Can-We-Fix-It";
const REPO = "Support-Team";

let allIssues = [];
let selectedAgent = null;

/* -------------------------
   GET PRIORITY (FIXED)
--------------------------*/
function getPriority(issue) {
    if (!issue.body) return "low";

    const match = issue.body.match(/Priority:\s*(low|medium|high|urgent)/i);
    return match ? match[1].toLowerCase() : "low";
}

/* -------------------------
   GET AGENT (LABEL)
--------------------------*/
function getAgent(issue) {
    if (!issue.labels) return "Unassigned";
    const agent = issue.labels.find(l => l.name !== "bug" && l.name !== "enhancement");
    return agent ? agent.name : "Unassigned";
}

/* -------------------------
   FETCH ISSUES
--------------------------*/
async function load() {
    const res = await fetch(
        `https://api.github.com/repos/${OWNER}/${REPO}/issues?state=all&per_page=100`
    );

    allIssues = await res.json();
    render();
}

/* -------------------------
   RENDER AGENTS
--------------------------*/
function renderAgents() {
    const container = document.getElementById("agents");
    const agents = {};

    allIssues.forEach(i => {
        const a = getAgent(i);
        agents[a] = (agents[a] || 0) + 1;
    });
