<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Dashboard</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    margin: 0;
    padding: 20px;
    color: white;
}

.container {
    max-width: 1200px;
    margin: auto;
}

header {
    text-align: center;
    margin-bottom: 20px;
}

button {
    padding: 10px 15px;
    border: none;
    cursor: pointer;
    border-radius: 6px;
    margin-top: 10px;
}

.stats {
    display: flex;
    gap: 10px;
    margin: 20px 0;
}

.stat-box {
    background: white;
    color: black;
    padding: 15px;
    border-radius: 10px;
    flex: 1;
    text-align: center;
}

.main {
    display: flex;
    gap: 20px;
}

.sidebar {
    width: 250px;
    background: white;
    color: black;
    border-radius: 10px;
    padding: 10px;
}

.milestones {
    flex: 1;
}

.card {
    background: white;
    color: black;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">

<header>
    <h1>Support Dashboard</h1>
    <button onclick="fetchAndRender()">🔄 Refresh</button>
</header>

<!-- MUST EXIST ELEMENTS (fixes your error) -->
<div class="stats" id="stats"></div>

<div class="main">
    <div class="sidebar" id="teamMembers"></div>
    <div class="milestones" id="milestones"></div>
</div>

</div>

<script>
const OWNER = "Can-We-Fix-It";
const REPO = "Support-Team";

let allMilestones = [];
let selectedMember = null;

/* ---------------- FETCH ---------------- */
async function fetchMilestones() {
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/milestones?state=all`);
    return await res.json();
}

async function fetchIssues(milestone) {
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/issues?milestone=${milestone}&state=all`);
    return await res.json();
}

/* ---------------- LOAD ---------------- */
async function fetchAndRender() {
    document.getElementById("milestones").innerHTML = "Loading...";

    const milestones = await fetchMilestones();

    const data = await Promise.all(
        milestones.map(async m => {
            const issues = await fetchIssues(m.number);
            return { ...m, issues };
        })
    );

    allMilestones = data;
    render();
}

/* ---------------- RENDER ---------------- */
function render() {

    let filtered = allMilestones;

    if (selectedMember) {
        filtered = filtered.filter(m => m.title === selectedMember);
    }

    /* STATS */
    const total = filtered.reduce((a, m) => a + m.issues.length, 0);

    document.getElementById("stats").innerHTML = `
        <div class="stat-box">Total Issues: ${total}</div>
        <div class="stat-box">Milestones: ${filtered.length}</div>
    `;

    /* TEAM */
    const members = [...new Set(allMilestones.map(m => m.title))];

    document.getElementById("teamMembers").innerHTML = `
        <h3>Team</h3>
        ${members.map(m => `
            <div onclick="selectMember('${m}')" style="cursor:pointer;padding:5px;">
                ${m}
            </div>
        `).join("")}
    `;

    /* MILESTONES */
    document.getElementById("milestones").innerHTML = filtered.map(m => `
        <div class="card">
            <h3>${m.title}</h3>
            <p>${m.issues.length} issues</p>

            ${m.issues.map(i => `
                <div>
                    • ${i.title} (#${i.number})
                </div>
            `).join("")}
        </div>
    `).join("");
}

/* ---------------- FILTER ---------------- */
function selectMember(name) {
    selectedMember = selectedMember === name ? null : name;
    render();
}

/* ---------------- START ---------------- */
window.onload = fetchAndRender;
</script>

</body>
</html>
