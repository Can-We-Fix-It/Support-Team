<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Team - Issue Tracking Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 20px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        .stat-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 25px;
            margin-bottom: 40px;
        }

        .team-members {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .team-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            font-weight: bold;
            text-align: center;
        }

        .member-item {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .member-item:last-child {
            border-bottom: none;
        }

        .member-item:hover {
            background: #f5f5f5;
        }

        .member-item.active {
            background: #667eea;
            color: white;
            font-weight: bold;
        }

        .member-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .member-name {
            flex: 1;
        }

        .member-severity-badge {
            font-size: 0.7em;
            padding: 3px 8px;
            border-radius: 12px;
            font-weight: bold;
            margin-left: 8px;
        }

        .severity-severe-badge {
            background: #ff4444;
            color: white;
        }

        .severity-medium-badge {
            background: #ffaa00;
            color: white;
        }

        .severity-low-badge {
            background: #44aa44;
            color: white;
        }

        .member-badge {
            background: #667eea;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            flex-shrink: 0;
        }

        .member-item.active .member-badge {
            background: white;
            color: #667eea;
        }

        .severity-filter {
            display: flex;
            gap: 8px;
            padding: 15px 20px;
            border-top: 1px solid #eee;
            background: #f9f9f9;
            flex-wrap: wrap;
        }

        .filter-btn {
            flex: 1;
            min-width: 70px;
            padding: 8px 12px;
            border: 2px solid;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.75em;
            transition: all 0.2s ease;
            background: white;
        }

        .filter-btn.severe {
            border-color: #ff4444;
            color: #ff4444;
        }

        .filter-btn.severe.active {
            background: #ff4444;
            color: white;
        }

        .filter-btn.medium {
            border-color: #ffaa00;
            color: #ffaa00;
        }

        .filter-btn.medium.active {
            background: #ffaa00;
            color: white;
        }

        .filter-btn.low {
            border-color: #44aa44;
            color: #44aa44;
        }

        .filter-btn.low.active {
            background: #44aa44;
            color: white;
        }

        .filter-label {
            width: 100%;
            font-size: 0.75em;
            color: #666;
            text-align: center;
            padding: 5px 0 0 0;
        }

        .milestones {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .milestone-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .milestone-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
        }

        .milestone-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
        }

        .milestone-title-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .milestone-title {
            font-size: 1.5em;
            font-weight: bold;
        }

        .severity-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.3);
        }

        .severity-severe {
            background: #ff4444 !important;
            color: white;
        }

        .severity-medium {
            background: #ffaa00 !important;
            color: white;
        }

        .severity-low {
            background: #44aa44 !important;
            color: white;
        }

        .severity-display {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .severity-display-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: default;
            font-weight: bold;
            font-size: 0.8em;
            opacity: 0.5;
            color: white;
        }

        .severity-display-btn.severe {
            background: #ff4444;
        }

        .severity-display-btn.medium {
            background: #ffaa00;
        }

        .severity-display-btn.low {
            background: #44aa44;
        }

        .progress-bar {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
            margin-bottom: 8px;
            margin-top: 12px;
        }

        .progress-fill {
            background: #4ade80;
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 0.9em;
            opacity: 0.9;
            margin-top: 8px;
        }

        .milestone-content {
            padding: 20px;
            max-height: 500px;
            overflow-y: auto;
        }

        .issue-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 15px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .issue-item:hover {
            background: #e9ecef;
        }

        .issue-item.completed {
            opacity: 0.6;
        }

        .issue-item.completed .issue-title {
            text-decoration: line-through;
            color: #999;
        }

        .checkbox {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            margin-top: 2px;
            cursor: pointer;
            accent-color: #667eea;
            flex-shrink: 0;
        }

        .issue-info {
            flex: 1;
        }

        .issue-title {
            font-weight: 500;
            color: #333;
            margin-bottom: 4px;
            word-break: break-word;
        }

        .issue-number {
            color: #999;
            font-size: 0.85em;
        }

        .issue-link {
            color: #667eea;
            text-decoration: none;
            margin-left: 8px;
            font-size: 0.85em;
        }

        .issue-link:hover {
            text-decoration: underline;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }

        .footer {
            text-align: center;
            color: white;
            padding: 20px;
            margin-top: 40px;
            opacity: 0.8;
        }

        .update-time {
            font-size: 0.9em;
            color: white;
            opacity: 0.7;
            text-align: center;
            margin-top: 20px;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
            padding: 40px;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #fcc;
        }

        .refresh-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            transition: all 0.2s ease;
        }

        .refresh-btn:hover {
            background: #f0f0f0;
            transform: scale(1.05);
        }

        @media (max-width: 968px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .team-members {
                position: relative;
                top: auto;
            }

            h1 {
                font-size: 1.8em;
            }

            .milestones {
                grid-template-columns: 1fr;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 Support Team Dashboard</h1>
            <p class="subtitle">Track issues by team member and severity</p>
            <button class="refresh-btn" onclick="fetchAndRender()">🔄 Refresh Data</button>
        </header>

        <div id="error"></div>
        <div class="stats" id="stats"></div>

        <div class="main-content">
            <div class="team-members">
                <div class="team-header">👥 Team Members</div>
                <div id="teamMembers"></div>
                <div class="severity-filter">
                    <button class="filter-btn severe" onclick="toggleSeverityFilter('severe')">🔴 Severe</button>
                    <button class="filter-btn medium" onclick="toggleSeverityFilter('medium')">🟠 Medium</button>
                    <button class="filter-btn low" onclick="toggleSeverityFilter('low')">🟢 Low</button>
                    <div class="filter-label">Filter by severity</div>
                </div>
            </div>
            <div class="milestones" id="milestones"></div>
        </div>

        <div class="update-time">
            Last updated: <span id="updateTime">Loading...</span>
        </div>

        <div class="footer">
            <p>💡 Click team members to filter • Use severity buttons to filter by priority • Priorities set on GitHub</p>
        </div>
    </div>

    <script>
        const REPO_OWNER = 'Can-We-Fix-It';
        const REPO_NAME = 'Support-Team';
        const STORAGE_KEY = 'supportTeamDashboard_completed';
        const SEVERITY_STORAGE_KEY = 'supportTeamDashboard_severity';
        const COLORS = [
            '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7',
            '#DFE6E9', '#A29BFE', '#FD79A8', '#FDCB6E', '#6C5CE7'
        ];

        let allMilestones = [];
        let selectedMember = null;
        let selectedSeverityFilter = null;

        function loadCompletedIssues() {
            const stored = localStorage.getItem(STORAGE_KEY);
            return stored ? JSON.parse(stored) : [];
        }

        function saveCompletedIssues(completed) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(completed));
        }

        function loadSeverities() {
            const stored = localStorage.getItem(SEVERITY_STORAGE_KEY);
            return stored ? JSON.parse(stored) : {};
        }

        function saveSeverities(severities) {
            localStorage.setItem(SEVERITY_STORAGE_KEY, JSON.stringify(severities));
        }

        function getSeverity(milestoneName) {
            const severities = loadSeverities();
            return severities[milestoneName] || null;
        }

        function toggleSeverityFilter(severity) {
            selectedSeverityFilter = selectedSeverityFilter === severity ? null : severity;
            renderTeamMembers(allMilestones);
            renderDashboard(allMilestones);
        }

        function showError(message) {
            document.getElementById('error').innerHTML = `<div class="error">⚠️ ${message}</div>`;
        }

        function clearError() {
            document.getElementById('error').innerHTML = '';
        }

        async function fetchMilestones() {
            try {
                clearError();
                const response = await fetch(
                    `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/milestones?state=all&per_page=50`,
                    { headers: { 'Accept': 'application/vnd.github.v3+json' } }
                );
                
                if (!response.ok) throw new Error(`GitHub API error: ${response.status}`);
                
                return await response.json();
            } catch (error) {
                showError(`Failed to fetch milestones: ${error.message}`);
                return [];
            }
        }

        async function fetchIssuesForMilestone(milestoneNumber) {
            try {
                const response = await fetch(
                    `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues?milestone=${milestoneNumber}&state=all&per_page=100`,
                    { headers: { 'Accept': 'application/vnd.github.v3+json' } }
                );
                
                if (!response.ok) throw new Error(`GitHub API error: ${response.status}`);
                
                return await response.json();
            } catch (error) {
                console.error('Error fetching issues:', error);
                return [];
            }
        }

        async function fetchAndRender() {
            document.getElementById('milestones').innerHTML = '<div class="loading">Loading milestones...</div>';
            
            const milestones = await fetchMilestones();
            
            if (milestones.length === 0) {
                document.getElementById('milestones').innerHTML = '<div class="empty-state">No milestones found</div>';
                updateTime();
                return;
            }

            // Fetch all issues for all milestones
            const milestonesWithIssues = await Promise.all(
                milestones.map(async (milestone) => ({
                    ...milestone,
                    issues: await fetchIssuesForMilestone(milestone.number)
                }))
            );

            allMilestones = milestonesWithIssues;
            renderTeamMembers(milestonesWithIssues);
            renderDashboard(milestonesWithIssues);
        }

        function renderTeamMembers(milestones) {
            const uniqueMembers = [...new Set(milestones.map(m => m.title))];
            const severities = loadSeverities();
            
            let membersHtml = '';
            
            uniqueMembers.forEach((member, index) => {
                const memberMilestones = milestones.filter(m => m.title === member);
                const severity = getSeverity(member);
                
                // Count issues - filter by severity filter if active
                let totalIssues = 0;
                memberMilestones.forEach(m => {
                    if (selectedSeverityFilter) {
                        if (severities[m.title] === selectedSeverityFilter) {
                            totalIssues += m.issues.length;
                        }
                    } else {
                        totalIssues += m.issues.length;
                    }
                });

                const isActive = selectedMember === member ? 'active' : '';
                
                let severityBadgeHtml = '';
                if (severity) {
                    severityBadgeHtml = `<span class="member-severity-badge severity-${severity}-badge">${severity.toUpperCase()}</span>`;
                }
                
                membersHtml += `
                    <div class="member-item ${isActive}" onclick="selectMember('${escapeHtml(member)}')">
                        <div class="member-info">
                            <span class="member-name">${escapeHtml(member)}</span>
                            ${severityBadgeHtml}
                        </div>
                        <span class="member-badge">${totalIssues}</span>
                    </div>
                `;
            });
            
            document.getElementById('teamMembers').innerHTML = membersHtml;
            
            // Update filter button states
            document.querySelectorAll('.filter-btn').forEach(btn => {
                const severity = btn.classList[1];
                if (selectedSeverityFilter === severity) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        function selectMember(memberName) {
            selectedMember = selectedMember === memberName ? null : memberName;
            renderTeamMembers(allMilestones);
            renderDashboard(allMilestones);
        }

        function renderDashboard(milestones) {
            // Filter by selected member if any
            let filteredMilestones = selectedMember 
                ? milestones.filter(m => m.title === selectedMember)
                : milestones;

            // Filter by selected severity if any
            const severities = loadSeverities();
            if (selectedSeverityFilter) {
                filteredMilestones = filteredMilestones.filter(m => severities[m.title] === selectedSeverityFilter);
            }

            const completed = loadCompletedIssues();
            let totalIssues = 0;
            let completedCount = 0;

            // Calculate stats
            filteredMilestones.forEach(milestone => {
                milestone.issues.forEach(issue => {
                    totalIssues++;
                    if (completed.includes(issue.id)) {
                        completedCount++;
                    }
                });
            });

            // Render stats
            let filterLabel = '';
            if (selectedMember && selectedSeverityFilter) {
                filterLabel = ` (${selectedMember} - ${selectedSeverityFilter})`;
            } else if (selectedMember) {
                filterLabel = ` (${selectedMember})`;
            } else if (selectedSeverityFilter) {
                filterLabel = ` (${selectedSeverityFilter})`;
            }

            const statsHtml = `
                <div class="stat-box">
                    <div class="stat-number">${totalIssues}</div>
                    <div class="stat-label">Total Issues${filterLabel}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number">${completedCount}</div>
                    <div class="stat-label">Completed</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number">${totalIssues > 0 ? Math.round((completedCount / totalIssues) * 100) : 0}%</div>
                    <div class="stat-label">Progress</div>
                </div>
            `;
            document.getElementById('stats').innerHTML = statsHtml;

            // Render milestones
            let milestonesHtml = '';
            filteredMilestones.forEach((milestone, index) => {
                const severity = severities[milestone.title];
                const milestoneCompleted = milestone.issues.filter(issue => completed.includes(issue.id)).length;
                const progress = milestone.issues.length > 0 ? (milestoneCompleted / milestone.issues.length) * 100 : 0;
                const color = COLORS[index % COLORS.length];

                let issuesHtml = '';
                milestone.issues.forEach(issue => {
                    const isCompleted = completed.includes(issue.id);
                    issuesHtml += `
                        <div class="issue-item ${isCompleted ? 'completed' : ''}">
                            <input type="checkbox" class="checkbox" data-id="${issue.id}" ${isCompleted ? 'checked' : ''} onchange="toggleIssue(${issue.id})">
                            <div class="issue-info">
                                <div class="issue-title">${escapeHtml(issue.title)}</div>
                                <div class="issue-number">Issue #${issue.number} <a href="${issue.html_url}" class="issue-link" target="_blank">View on GitHub →</a></div>
                            </div>
                        </div>
                    `;
                });

                // Show severity display buttons (read-only, not clickable)
                let severityDisplayHtml = '';
                if (severity) {
                    severityDisplayHtml = `<div class="severity-display"><span class="severity-display-btn ${severity}">${severity.toUpperCase()}</span></div>`;
                }

                milestonesHtml += `
                    <div class="milestone-card">
                        <div class="milestone-header" style="background: linear-gradient(135deg, ${color} 0%, ${adjustColor(color, -30)} 100%);">
                            <div class="milestone-title-section">
                                <div class="milestone-title">${escapeHtml(milestone.title)}</div>
                                ${severity ? `<span class="severity-badge severity-${severity}">${severity.toUpperCase()}</span>` : ''}
                            </div>
                            ${severityDisplayHtml}
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${progress}%"></div>
                            </div>
                            <div class="progress-text">${milestoneCompleted} of ${milestone.issues.length} completed</div>
                        </div>
                        <div class="milestone-content">
                            ${issuesHtml || '<div class="empty-state">No issues in this milestone</div>'}
                        </div>
                    </div>
                `;
            });

            document.getElementById('milestones').innerHTML = milestonesHtml || '<div class="empty-state">No milestones found</div>';
            updateTime();
        }

        function toggleIssue(id) {
            const completed = loadCompletedIssues();
            const index = completed.indexOf(id);
            if (index > -1) {
                completed.splice(index, 1);
            } else {
                completed.push(id);
            }
            saveCompletedIssues(completed);
            
            // Re-render to keep UI in sync
            renderDashboard(allMilestones);
        }

        function adjustColor(color, percent) {
            const num = parseInt(color.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = (num >> 16) + amt;
            const G = (num >> 8 & 0x00FF) + amt;
            const B = (num & 0x0000FF) + amt;
            return '#' + (0x1000000 + (R < 255 ? R < 1 ? 0 : R : 255) * 0x10000 +
                (G < 255 ? G < 1 ? 0 : G : 255) * 0x100 +
                (B < 255 ? B < 1 ? 0 : B : 255))
                .toString(16).slice(1);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('en-US', { 
                hour: '2-digit', 
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('updateTime').textContent = timeString;
        }

        // Start on page load
        window.addEventListener('load', () => {
            fetchAndRender();
            // Auto-refresh every 60 seconds
            setInterval(() => {
                fetchAndRender();
            }, 60000);
        });
    </script>
</body>
</html>
