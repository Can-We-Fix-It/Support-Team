<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Dashboard</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: linear-gradient(135deg,#667eea,#764ba2);
    color: white;
}

.container { padding: 20px; }

h1 { text-align: center; }

.stats {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin: 20px 0;
}

.stat-box {
    background: white;
    color: black;
    padding: 15px;
    border-radius: 10px;
    min-width: 120px;
    text-align: center;
}

.main {
    display: flex;
    gap: 20px;
}

.sidebar {
    width: 250px;
    background: white;
    color: black;
    padding: 10px;
    border-radius: 10px;
}

.card {
    background: white;
    color: black;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 10px;
}

.priority {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 20px;
    font-size: 12px;
    color: white;
}

.low { background: green; }
.medium { background: orange; }
.high { background: red; }
.urgent { background: darkred; }

.issue {
    border-top: 1px solid #ddd;
    padding-top: 10px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
<h1>Support Team Dashboard</h1>

<div class="stats" id="stats"></div>

<div class="main">
    <div class="sidebar" id="agents"></div>
    <div id="issues"></div>
</div>

</div>

<script>
const REPO = "Can-We-Fix-It/Support-Team";

let allIssues = [];
let selectedAgent = null;

function getPriority(labels) {
    if (!labels) return "low";

    for (let l of labels) {
        let name = l.name.toLowerCase();
        if (["urgent","high","medium","low"].includes(name)) return name;
    }
    return "low";
}

function getAgent(labels) {
    if (!labels) return "Unassigned";

    for (let l of labels) {
        // everything EXCEPT priority labels = agent
        let name = l.name;
        if (!["urgent","high","medium","low"].includes(name.toLowerCase())) {
            return name;
        }
    }
    return "Unassigned";
}

async function fetchIssues() {
    const res = await fetch(`https://api.github.com/repos/${REPO}/issues?state=open&per_page=100`);

    if (!res.ok) {
        const text = await res.text();
        throw new Error("GitHub API error: " + res.status + " " + text);
    }

    const data = await res.json();

    // filter out PRs
    return data.filter(i => !i.pull_request);
}

function renderAgents() {
    let map = {};

    allIssues.forEach(i => {
        let agent = getAgent(i.labels);
        map[agent] = (map[agent] || 0) + 1;
    });

    let html = "";
    for (let agent in map) {
        html += `
            <div onclick="selectAgent('${agent}')"
                 style="padding:10px;border-bottom:1px solid #eee;cursor:pointer;">
                ${agent} (${map[agent]})
            </div>
        `;
    }

    document.getElementById("agents").innerHTML = html;
}

function renderIssues() {
    let filtered = selectedAgent
        ? allIssues.filter(i => getAgent(i.labels) === selectedAgent)
        : allIssues;

    let html = "";

    filtered.forEach(i => {
        let priority = getPriority(i.labels);

        html += `
        <div class="card">
            <b>${i.title}</b><br>

            <span class="priority ${priority}">
                ${priority.toUpperCase()}
            </span>

            <div class="issue">
                Agent: ${getAgent(i.labels)} <br>
                #${i.number} - <a href="${i.html_url}" target="_blank">View</a>
            </div>
        </div>`;
    });

    document.getElementById("issues").innerHTML = html;
}

function selectAgent(name) {
    selectedAgent = name;
    renderIssues();
}

async function load() {
    try {
        allIssues = await fetchIssues();
        renderAgents();
        renderIssues();
    } catch (err) {
        document.body.innerHTML = "<h2 style='color:white;text-align:center'>Error: " + err.message + "</h2>";
    }
}

load();
</script>

</body>
</html>
