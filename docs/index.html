<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Team - Issue Tracking Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 20px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        .stat-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 25px;
            margin-bottom: 40px;
        }

        .team-members {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .team-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            font-weight: bold;
            text-align: center;
        }

        .member-item {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .member-item:hover {
            background: #f5f5f5;
        }

        .member-item.active {
            background: #667eea;
            color: white;
            font-weight: bold;
        }

        .member-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .member-badge {
            background: #667eea;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
        }

        .member-item.active .member-badge {
            background: white;
            color: #667eea;
        }

        .severity-filter {
            display: flex;
            gap: 8px;
            padding: 15px 20px;
            border-top: 1px solid #eee;
            background: #f9f9f9;
            flex-wrap: wrap;
        }

        .filter-btn {
            flex: 1;
            min-width: 70px;
            padding: 8px 12px;
            border: 2px solid;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.75em;
            transition: all 0.2s ease;
            background: white;
        }

        .filter-btn.severe { border-color: #ff4444; color: #ff4444; }
        .filter-btn.medium { border-color: #ffaa00; color: #ffaa00; }
        .filter-btn.low { border-color: #44aa44; color: #44aa44; }

        .filter-btn.active.severe { background: #ff4444; color: white; }
        .filter-btn.active.medium { background: #ffaa00; color: white; }
        .filter-btn.active.low { background: #44aa44; color: white; }

        .milestones {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .milestone-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .milestone-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
        }

        .milestone-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
        }

        .progress-bar {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
            margin-bottom: 8px;
            margin-top: 12px;
        }

        .progress-fill {
            background: #4ade80;
            height: 100%;
        }

        .milestone-content {
            padding: 20px;
        }

        .issue-item {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .loading, .empty-state {
            text-align: center;
            padding: 40px;
            color: white;
        }

        .refresh-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>

<body>
<div class="container">
    <header>
        <h1>🎯 Support Dashboard</h1>
        <p class="subtitle">GitHub Issue Tracker</p>
        <button class="refresh-btn" onclick="fetchAndRender()">🔄 Refresh</button>
    </header>

    <div id="milestones" class="loading">Loading...</div>
</div>

<script>
const REPO_OWNER = 'Can-We-Fix-It';
const REPO_NAME = 'Support-Team';
const STORAGE_KEY = 'supportTeamDashboard_completed';

// 🔐 PUT YOUR NEW TOKEN HERE (classic token with repo access)
const GITHUB_TOKEN = "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";

let allIssues = [];
let selectedMember = null;
let selectedSeverityFilter = null;

function getHeaders() {
    return {
        "Accept": "application/vnd.github+json",
        "Authorization": `Bearer ${GITHUB_TOKEN}`
    };
}

// ---------------- FETCH ----------------
async function fetchIssues() {
    const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues?state=all&per_page=100`;

    const res = await fetch(url, { headers: getHeaders() });

    if (!res.ok) {
        const text = await res.text();
        throw new Error(`GitHub Error ${res.status}: ${text}`);
    }

    return await res.json();
}

// ---------------- PRIORITY ----------------
function getPriority(issue) {
    if (!issue.labels) return null;

    for (const label of issue.labels) {
        if (["Severe", "Medium", "Low"].includes(label.name)) {
            return label.name;
        }
    }
    return null;
}

// ---------------- NAME ----------------
function getName(user) {
    return user?.login || "Unassigned";
}

// ---------------- RENDER ----------------
function render() {
    let issues = allIssues;

    if (selectedSeverityFilter) {
        issues = issues.filter(i => getPriority(i) === selectedSeverityFilter);
    }

    if (selectedMember) {
        issues = issues.filter(i => getName(i.assignee) === selectedMember);
    }

    document.getElementById("stats").innerHTML = `
        <div class="stat-box">
            <div class="stat-number">${issues.length}</div>
            <div class="stat-label">Issues</div>
        </div>
    `;

    const members = [...new Set(allIssues.map(i => getName(i.assignee)))];

    document.getElementById("teamMembers").innerHTML = members.map(m => `
        <div class="member-item" onclick="selectMember('${m}')">
            ${m}
        </div>
    `).join("");

    document.getElementById("milestones").innerHTML = issues.map(issue => `
        <div class="milestone-card">
            <div class="milestone-header">
                <div class="milestone-title">${issue.title}</div>
                <div>#${issue.number}</div>
            </div>
            <div class="milestone-content">
                <p>👤 ${getName(issue.assignee)}</p>
                <p>🏷️ ${getPriority(issue) || "No Priority"}</p>
                <a href="${issue.html_url}" target="_blank">View</a>
            </div>
        </div>
    `).join("");
}

// ---------------- FILTERS ----------------
function selectMember(name) {
    selectedMember = selectedMember === name ? null : name;
    render();
}

function toggleSeverityFilter(level) {
    selectedSeverityFilter = selectedSeverityFilter === level ? null : level;
    render();
}

// ---------------- LOAD ----------------
async function fetchAndRender() {
    try {
        document.getElementById("milestones").innerHTML = "Loading...";

        allIssues = await fetchIssues();

        console.log("ISSUES:", allIssues);

        render();

    } catch (err) {
        console.error(err);
        document.getElementById("milestones").innerHTML =
            `<div class="error">${err.message}</div>`;
    }
}

window.onload = fetchAndRender;
</script>
</body>
</html>
