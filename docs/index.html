<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Team Dashboard</title>

<style>
/* ===== YOUR ORIGINAL STYLE (unchanged) ===== */

* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial;
    background: linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    padding:20px;
}

.container { max-width:1200px; margin:0 auto; }

header { text-align:center; color:white; margin-bottom:40px; }

h1 { font-size:2.5em; }

.subtitle { opacity:0.9; }

.stats {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
    margin-bottom:40px;
}

.stat-box {
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
}

.stat-number { font-size:2em; color:#667eea; font-weight:bold; }

.main-content {
    display:grid;
    grid-template-columns:250px 1fr;
    gap:25px;
}

.team-members {
    background:white;
    border-radius:12px;
    padding:10px;
}

.member-item {
    padding:12px;
    border-bottom:1px solid #eee;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
}

.member-item:hover { background:#f5f5f5; }

.member-item.active { background:#667eea; color:white; }

.milestone-card {
    background:white;
    border-radius:12px;
    margin-bottom:20px;
    overflow:hidden;
}

.milestone-header {
    padding:15px;
    color:white;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

.issue-item {
    padding:10px;
    border-bottom:1px solid #eee;
}

.meta {
    font-size:0.85em;
    color:#666;
    margin-top:5px;
}

.badge {
    padding:3px 8px;
    border-radius:12px;
    font-size:0.7em;
    margin-left:5px;
}

.priority-low { background:#44aa44; color:white; }
.priority-medium { background:#ffaa00; color:white; }
.priority-severe { background:#ff4444; color:white; }

.agent-tag {
    background:#222;
    color:white;
    padding:2px 6px;
    border-radius:10px;
    font-size:0.7em;
    margin-left:5px;
}

</style>
</head>

<body>
<div class="container">

<header>
<h1>🎯 Support Dashboard</h1>
<p class="subtitle">GitHub Issues Tracking</p>
</header>

<div class="stats" id="stats"></div>

<div class="main-content">

<div class="team-members" id="teamMembers"></div>

<div id="milestones"></div>

</div>

</div>

<script>

const OWNER = "Can-We-Fix-It";
const REPO = "Support-Team";

let allData = [];
let selectedAgent = null;

/* =========================
   PRIORITY (LABELS ONLY)
========================= */
function getPriority(issue) {
    const labels = issue.labels?.map(l => l.name) || [];

    if (labels.includes("Severe")) return "Severe";
    if (labels.includes("Medium")) return "Medium";
    if (labels.includes("Low")) return "Low";

    return "Low";
}

/* =========================
   AGENT = ANY NON-PRIORITY LABEL
========================= */
function getAgent(issue) {
    const labels = issue.labels?.map(l => l.name) || [];

    const priorityLabels = ["Severe", "Medium", "Low"];

    const agent = labels.find(l => !priorityLabels.includes(l));

    return agent || "Unassigned";
}

/* =========================
   FETCH MILESTONES
========================= */
async function fetchData() {
    const res = await fetch(
        `https://api.github.com/repos/${OWNER}/${REPO}/issues?state=all&per_page=100`
    );

    const issues = await res.json();

    if (!Array.isArray(issues)) {
        console.log("ERROR:", issues);
        return;
    }

    allData = issues;
    render();
}

/* =========================
   GROUP BY AGENT
========================= */
function groupByAgent(data) {
    const map = {};

    data.forEach(issue => {
        const agent = getAgent(issue);
        if (!map[agent]) map[agent] = [];
        map[agent].push(issue);
    });

    return map;
}

/* =========================
   RENDER
========================= */
function render() {

    const grouped = groupByAgent(allData);

    /* STATS */
    let total = allData.length;
    let stats = `
        <div class="stat-box">
            <div class="stat-number">${total}</div>
            <div>Total Issues</div>
        </div>
    `;

    document.getElementById("stats").innerHTML = stats;

    /* TEAM LIST */
    let teamHTML = "";

    Object.keys(grouped).forEach(agent => {

        const issues = grouped[agent];

        teamHTML += `
            <div class="member-item ${selectedAgent===agent?'active':''}"
                 onclick="selectAgent('${agent}')">
                <div>${agent}</div>
                <div>${issues.length}</div>
            </div>
        `;
    });

    document.getElementById("teamMembers").innerHTML = teamHTML;

    /* ISSUES */
    let display = selectedAgent ? grouped[selectedAgent] : allData;

    let html = "";

    display.forEach(issue => {

        const priority = getPriority(issue);
        const agent = getAgent(issue);

        html += `
        <div class="milestone-card">
            <div class="milestone-header">
                <div>
                    #${issue.number} ${issue.title}
                </div>

                <div style="margin-top:8px;">
                    <span class="badge priority-${priority.toLowerCase()}">
                        ${priority}
                    </span>

                    <span class="agent-tag">
                        ${agent}
                    </span>
                </div>
            </div>

            <div class="issue-item meta">
                <a href="${issue.html_url}" target="_blank">
                    View on GitHub →
                </a>
            </div>
        </div>
        `;
    });

    document.getElementById("milestones").innerHTML = html;
}

/* =========================
   FILTER
========================= */
function selectAgent(agent) {
    selectedAgent = selectedAgent === agent ? null : agent;
    render();
}

fetchData();
setInterval(fetchData, 60000);

</script>

</body>
</html>
