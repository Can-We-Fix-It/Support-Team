<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Team Dashboard</title>

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial;
    background: linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    padding:15px;
}

.container {
    max-width:1200px;
    margin:0 auto;
}

header {
    text-align:center;
    color:white;
    margin-bottom:25px;
}

h1 { font-size:2.2em; }
.subtitle { opacity:0.9; }

.refresh-btn {
    margin-top:10px;
    padding:8px 12px;
    border-radius:8px;
    border:none;
    cursor:pointer;
    background:white;
    font-weight:500;
}

.stats {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:10px;
    margin-bottom:15px;
}

#monthFilters {
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.month-btn {
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
    background:white;
    font-size:13px;
}

.month-btn.active {
    background:#111;
    color:white;
}

.stat-box {
    background:white;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

.stat-number {
    font-size:1.8em;
    color:#667eea;
    font-weight:bold;
}

.main-content {
    display:grid;
    grid-template-columns:260px 1fr;
    gap:15px;
}

.team-members {
    background:white;
    border-radius:12px;
    padding:8px;
    height:fit-content;
}

@media (min-width: 901px) {
    .team-members { position:sticky; top:10px; }
}

.member-item {
    padding:10px;
    border-bottom:1px solid #eee;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
}

.member-item.active {
    background:#667eea;
    color:white;
}

.milestone-card {
    background:white;
    border-radius:12px;
    margin-bottom:15px;
    overflow:hidden;
}

.milestone-header {
    padding:12px;
    color:white;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

.badge {
    padding:3px 8px;
    border-radius:12px;
    font-size:0.7em;
}

.priority-low { background:#44aa44; color:white; }
.priority-medium { background:#ffaa00; color:white; }
.priority-severe { background:#ff4444; color:white; }

.agent-tag {
    background:#111;
    color:white;
    padding:3px 8px;
    border-radius:12px;
    font-size:0.7em;
}

.issue-item { padding:12px; }

.description-label {
    font-weight:600;
    margin-bottom:5px;
}

.description-text {
    white-space:pre-wrap;
    line-height:1.5;
}

.meta {
    font-size:0.85em;
    color:#666;
    margin-top:4px;
}
</style>
</head>

<body>

<div class="container">

<header>
<h1>🎯 Support Dashboard</h1>
<p class="subtitle">GitHub Issues Tracking</p>

<button class="refresh-btn" onclick="forceRefresh()">🔄 Refresh</button>

</header>

<div class="stats" id="stats"></div>
<div id="monthFilters"></div>

<div class="main-content">
    <div class="team-members" id="teamMembers"></div>
    <div id="milestones"></div>
</div>

</div>

<script>

const OWNER = "Can-We-Fix-It";
const REPO = "Support-Team";
const CACHE_KEY = "support_dashboard_cache_v1";

let allData = [];
let selectedAgent = null;
let selectedMonth = null;

/* ================= CACHE ================= */
function saveCache(data){
    localStorage.setItem(CACHE_KEY, JSON.stringify({
        time: Date.now(),
        data
    }));
}

function loadCache(){
    const c = localStorage.getItem(CACHE_KEY);
    return c ? JSON.parse(c) : null;
}

/* ================= FETCH ================= */
async function fetchData(force=false){

    const cached = loadCache();

    if(cached && !force){
        allData = cached.data;
        render();
        return;
    }

    const res = await fetch(
        `https://api.github.com/repos/${OWNER}/${REPO}/issues?state=all&per_page=100`
    );

    const issues = await res.json();
    if(!Array.isArray(issues)) return;

    allData = issues;
    saveCache(issues);
    render();
}

function forceRefresh(){
    fetchData(true);
}

/* ================= PRIORITY ================= */
function getPriority(issue){
    const labels = issue.labels?.map(l => l.name) || [];
    if(labels.includes("Severe")) return "Severe";
    if(labels.includes("Medium")) return "Medium";
    return "Low";
}

/* ================= AGENT ================= */
function getAgent(issue){
    const labels = issue.labels?.map(l => l.name) || [];
    const ignore = ["Severe","Medium","Low"];
    return labels.find(l => !ignore.includes(l)) || "Unassigned";
}

/* ================= DATE (HYBRID FIXED) ================= */
function getRaisedDate(issue){

    const labels = issue.labels?.map(l => l.name) || [];

    // 1) TITLE FORMAT: "3rd March 2026 - bug"
    const match = issue.title.match(/^(.+?\d{4})\s*-\s*(.*)$/);
    if(match){
        return {
            date: match[1],
            cleanTitle: match[2]
        };
    }

    // 2) LABEL FORMAT: date-3-march-2026
    const dateLabel = labels.find(l => l.startsWith("date-"));
    if(dateLabel){
        const parts = dateLabel.replace("date-","").split("-");
        return {
            date: `${parts[0]} ${parts[1]} ${parts[2]}`,
            cleanTitle: issue.title
        };
    }

    return {
        date: "Not set",
        cleanTitle: issue.title
    };
}

/* ================= FILTERS ================= */
function selectAgent(a){
    selectedAgent = selectedAgent === a ? null : a;
    render();
}

function selectMonth(m){
    selectedMonth = selectedMonth === m ? null : m;
    render();
}

/* ================= RENDER ================= */
function render(){

    let display = allData;

    if(selectedAgent){
        display = display.filter(i => getAgent(i) === selectedAgent);
    }

    if(selectedMonth){
        display = display.filter(i =>
            getRaisedDate(i).date.toLowerCase().includes(selectedMonth.toLowerCase())
        );
    }

    document.getElementById("stats").innerHTML = `
        <div class="stat-box">
            <div class="stat-number">${display.length}</div>
            <div>Total Issues</div>
        </div>
    `;

    const grouped = {};
    display.forEach(i=>{
        const a = getAgent(i);
        grouped[a] = grouped[a] || [];
        grouped[a].push(i);
    });

    let teamHTML = "";
    Object.keys(grouped).forEach(a=>{
        teamHTML += `
        <div class="member-item ${selectedAgent===a?'active':''}"
             onclick="selectAgent('${a}')">
            <div>${a}</div>
            <div>${grouped[a].length}</div>
        </div>`;
    });

    document.getElementById("teamMembers").innerHTML = teamHTML;

    let html = "";

    display.forEach(issue=>{

        const priority = getPriority(issue);
        const agent = getAgent(issue);
        const parsed = getRaisedDate(issue);

        html += `
        <div class="milestone-card">

            <div class="milestone-header">
                <div>#${issue.number} ${parsed.cleanTitle}</div>
                <div style="margin-top:8px;">
                    <span class="badge priority-${priority.toLowerCase()}">${priority}</span>
                    <span class="agent-tag">${agent}</span>
                </div>
            </div>

            <div class="issue-item">

                <div class="description-label">Description:</div>
                <div class="description-text">${issue.body || "No description"}</div>

                <div class="meta">📅 Raised: ${parsed.date}</div>
                <div class="meta">Created: ${new Date(issue.created_at).toLocaleDateString()}</div>
                <div class="meta">Updated: ${new Date(issue.updated_at).toLocaleDateString()}</div>

            </div>
        </div>`;
    });

    document.getElementById("milestones").innerHTML = html;
}

/* INIT */
fetchData();

</script>

</body>
</html>
