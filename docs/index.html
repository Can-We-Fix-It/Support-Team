<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Team Dashboard</title>

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial;
    background: linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    padding:15px;
}

/* ===== CONTAINER ===== */
.container {
    max-width:1200px;
    margin:0 auto;
}

/* ===== HEADER ===== */
header {
    text-align:center;
    color:white;
    margin-bottom:25px;
}

h1 {
    font-size:2.2em;
}

.subtitle {
    opacity:0.9;
}

/* ===== REFRESH BUTTON ===== */
.refresh-btn {
    margin-top:10px;
    padding:8px 12px;
    border-radius:8px;
    border:none;
    cursor:pointer;
    background:white;
    font-weight:500;
    transition:0.2s;
}

.refresh-btn:hover {
    transform:scale(1.03);
}

/* ===== STATS ===== */
.stats {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:10px;
    margin-bottom:15px;
}

/* ===== MONTH FILTER ===== */
#monthFilters {
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.month-btn {
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
    background:white;
    color:black;
    font-size:13px;
    transition:0.2s;
}

.month-btn.active {
    background:#111;
    color:white;
}

/* ===== STATS BOX ===== */
.stat-box {
    background:white;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

.stat-number {
    font-size:1.8em;
    color:#667eea;
    font-weight:bold;
}

/* ===== LAYOUT ===== */
.main-content {
    display:grid;
    grid-template-columns:260px 1fr;
    gap:15px;
}

/* ===== TEAM LIST ===== */
.team-members {
    background:white;
    border-radius:12px;
    padding:8px;
    height:fit-content;
}

@media (min-width: 901px) {
    .team-members {
        position: sticky;
        top: 10px;
    }
}

.member-item {
    padding:10px;
    border-bottom:1px solid #eee;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
    font-size:0.9em;
    transition:0.2s;
}

.member-item:hover {
    background:#f5f5f5;
}

.member-item.active {
    background:#667eea;
    color:white;
}

/* ===== ISSUE CARD ===== */
.milestone-card {
    background:white;
    border-radius:12px;
    margin-bottom:15px;
    overflow:hidden;
}

.milestone-header {
    padding:12px;
    color:white;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

.milestone-header div:first-child {
    font-weight:600;
    word-break:break-word;
}

/* ===== BADGES ===== */
.badge {
    padding:3px 8px;
    border-radius:12px;
    font-size:0.7em;
    margin-right:5px;
}

.priority-low { background:#44aa44; color:white; }
.priority-medium { background:#ffaa00; color:white; }
.priority-severe { background:#ff4444; color:white; }

.agent-tag {
    background:#111;
    color:white;
    padding:3px 8px;
    border-radius:12px;
    font-size:0.7em;
}

/* ===== ISSUE BODY ===== */
.issue-item {
    padding:12px;
}

/* DESCRIPTION FIX */
.description-label {
    font-weight:600;
    margin-bottom:5px;
    color:#333;
}

.description-text {
    white-space:pre-wrap;
    line-height:1.5;
    color:#222;
    margin-bottom:10px;
}

/* ===== META ===== */
.meta {
    font-size:0.85em;
    color:#666;
    margin-top:4px;
}

/* ===== MOBILE ===== */
@media (max-width: 900px) {

    .main-content {
        grid-template-columns:1fr;
    }

    .team-members {
        position:relative;
        display:flex;
        overflow-x:auto;
        white-space:nowrap;
        gap:8px;
        padding:10px;
    }

    .member-item {
        min-width:140px;
        border-bottom:none;
        border-right:1px solid #eee;
        flex-direction:column;
        align-items:flex-start;
        gap:5px;
    }

    h1 {
        font-size:1.6em;
    }

    .stats {
        grid-template-columns:repeat(2,1fr);
    }
}
</style>
</head>

<body>

<div class="container">

<header>
<h1>🎯 Support Dashboard</h1>
<p class="subtitle">GitHub Issues Tracking</p>

<button class="refresh-btn" onclick="forceRefresh()">
    🔄 Refresh Now
</button>

</header>

<div class="stats" id="stats"></div>
<div id="monthFilters"></div>

<div class="main-content">
    <div class="team-members" id="teamMembers"></div>
    <div id="milestones"></div>
</div>

</div>

<script>

const OWNER = "Can-We-Fix-It";
const REPO = "Support-Team";

const CACHE_KEY = "support_dashboard_cache_v1";

let allData = [];
let selectedAgent = null;
let selectedMonth = null;

/* ===== CACHE ===== */
function saveCache(data) {
    localStorage.setItem(CACHE_KEY, JSON.stringify({
        timestamp: Date.now(),
        data
    }));
}

function loadCache() {
    const cached = localStorage.getItem(CACHE_KEY);
    return cached ? JSON.parse(cached) : null;
}

/* ===== FETCH ===== */
async function fetchData(force = false) {

    const cached = loadCache();

    if (cached && !force) {
        allData = cached.data;
        render();
        return;
    }

    const res = await fetch(
        `https://api.github.com/repos/${OWNER}/${REPO}/issues?state=all&per_page=100`
    );

    const issues = await res.json();
    if (!Array.isArray(issues)) return;

    allData = issues;
    saveCache(issues);
    render();
}

function forceRefresh() {
    fetchData(true);
}

/* ===== LOGIC ===== */
function getPriority(issue) {
    const labels = issue.labels?.map(l => l.name) || [];
    if (labels.includes("Severe")) return "Severe";
    if (labels.includes("Medium")) return "Medium";
    return "Low";
}

function getAgent(issue) {
    const labels = issue.labels?.map(l => l.name) || [];
    const priorityLabels = ["Severe", "Medium", "Low"];
    return labels.find(l => !priorityLabels.includes(l)) || "Unassigned";
}

/* ===== HYBRID DATE SYSTEM (NEW) ===== */
function getRaisedDate(issue) {

    const labels = issue.labels?.map(l => l.name) || [];

    // 1. TITLE FORMAT: "4th March 2026 - bug"
    const titleMatch = issue.title.match(/^(.+?\d{4})\s*-\s*(.*)$/);
    if (titleMatch) {
        return {
            date: titleMatch[1],
            title: titleMatch[2]
        };
    }

    // 2. LABEL FORMAT: date-3-march-2026
    const dateLabel = labels.find(l => l.startsWith("date-"));
    if (dateLabel) {
        const parts = dateLabel.replace("date-", "").split("-");
        return {
            date: `${parts[0]} ${parts[1]} ${parts[2]}`,
            title: issue.title
        };
    }

    // 3. fallback
    return {
        date: "Not set",
        title: issue.title
    };
}

/* ===== FILTERS ===== */
function selectAgent(agent) {
    selectedAgent = selectedAgent === agent ? null : agent;
    render();
}

function selectMonth(month) {
    selectedMonth = selectedMonth === month ? null : month;
    render();
}

/* ===== RENDER ===== */
function render() {

    let display = allData;

    if (selectedAgent) {
        display = display.filter(i => getAgent(i) === selectedAgent);
    }

    if (selectedMonth) {
        display = display.filter(i =>
            getRaisedDate(i).date.toLowerCase().includes(selectedMonth.toLowerCase())
        );
    }

    document.getElementById("stats").innerHTML = `
        <div class="stat-box">
            <div class="stat-number">${display.length}</div>
            <div>Total Issues</div>
        </div>
    `;

    const months = [...new Set(allData.map(i =>
        getRaisedDate(i).date.split(" ")[1]
    ).filter(m => m))];

    document.getElementById("monthFilters").innerHTML =
        `<div class="month-btn ${!selectedMonth ? 'active' : ''}" onclick="selectMonth(null)">All</div>` +
        months.map(m =>
            `<div class="month-btn ${selectedMonth === m ? 'active' : ''}" onclick="selectMonth('${m}')">${m}</div>`
        ).join("");

    const grouped = {};
    display.forEach(i => {
        const a = getAgent(i);
        grouped[a] = grouped[a] || [];
        grouped[a].push(i);
    });

    let teamHTML = "";
    Object.keys(grouped).sort().forEach(agent => {
        teamHTML += `
            <div class="member-item ${selectedAgent === agent ? 'active' : ''}"
                 onclick="selectAgent('${agent}')">
                <div>${agent}</div>
                <div>${grouped[agent].length}</div>
            </div>
        `;
    });

    document.getElementById("teamMembers").innerHTML = teamHTML;

    let html = "";

    display.forEach(issue => {

        const priority = getPriority(issue);
        const agent = getAgent(issue);
        const parsed = getRaisedDate(issue);

        html += `
        <div class="milestone-card">

            <div class="milestone-header">
                <div>#${issue.number} ${parsed.title}</div>
                <div style="margin-top:8px;">
                    <span class="badge priority-${priority.toLowerCase()}">${priority}</span>
                    <span class="agent-tag">${agent}</span>
                </div>
            </div>

            <div class="issue-item">

                <div class="description-label">Description:</div>
                <div class="description-text">${issue.body || "No description provided."}</div>

                <div class="meta">Created: ${new Date(issue.created_at).toLocaleDateString()}</div>
                <div class="meta">📅 Raised: ${parsed.date}</div>
                <div class="meta">Updated: ${new Date(issue.updated_at).toLocaleDateString()}</div>

            </div>

        </div>`;
    });

    document.getElementById("milestones").innerHTML = html;
}

/* INIT */
fetchData();

</script>

</body>
</html>
