<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Team Dashboard</title>

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial;
    background: linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    padding:15px;
}

.container {
    max-width:1200px;
    margin:0 auto;
}

header {
    text-align:center;
    color:white;
    margin-bottom:20px;
}

h1 { font-size:2.2em; }
.subtitle { opacity:0.9; }

.actions {
    display:flex;
    gap:10px;
    justify-content:center;
    margin-top:10px;
}

button {
    padding:8px 12px;
    border-radius:8px;
    border:none;
    cursor:pointer;
    background:white;
}

/* FILTERS */
.filters {
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:12px;
}

.filter-btn {
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
    background:white;
    font-size:13px;
}

.filter-btn.active {
    background:#111;
    color:white;
}

/* STATS */
.stats {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:10px;
    margin-bottom:15px;
}

.stat-box {
    background:white;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

.stat-number {
    font-size:1.8em;
    color:#667eea;
    font-weight:bold;
}

/* LAYOUT */
.main-content {
    display:grid;
    grid-template-columns:260px 1fr;
    gap:15px;
}

.team-members {
    background:white;
    border-radius:12px;
    padding:8px;
}

.member-item {
    padding:10px;
    border-bottom:1px solid #eee;
    cursor:pointer;
}

.member-item.active {
    background:#667eea;
    color:white;
}

/* CARD */
.milestone-card {
    background:white;
    border-radius:12px;
    margin-bottom:15px;
    overflow:hidden;
}

.milestone-header {
    padding:12px;
    color:white;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

.milestone-body {
    padding:14px;
}

/* DESCRIPTION */
.description-label {
    font-weight:600;
    margin-bottom:6px;
}

.description-text {
    white-space:pre-wrap;
    line-height:1.5;
}

/* BADGES */
.badge {
    padding:3px 8px;
    border-radius:12px;
    font-size:0.7em;
    margin-right:5px;
}

.priority-low { background:#44aa44; color:white; }
.priority-medium { background:#ffaa00; color:white; }
.priority-high { background:#e74c3c; color:white; }
.priority-severe { background:#8e44ad; color:white; }

.agent-tag {
    background:#111;
    color:white;
    padding:3px 8px;
    border-radius:12px;
    font-size:0.7em;
}

/* MOBILE */
@media (max-width:900px) {
    .main-content { grid-template-columns:1fr; }
}
</style>
</head>

<body>

<div class="container">

<header>
<h1>🎯 Support Dashboard</h1>
<p class="subtitle">GitHub Issues Tracking</p>

<div class="actions">
    <button onclick="forceRefresh()">🔄 Refresh</button>
    <button onclick="printPage()">🖨 Print</button>
</div>

</header>

<div class="stats" id="stats"></div>

<div class="filters" id="monthFilters"></div>
<div class="filters" id="priorityFilters"></div>

<div class="main-content">
    <div class="team-members" id="teamMembers"></div>
    <div id="milestones"></div>
</div>

</div>

<script>

const OWNER="Can-We-Fix-It";
const REPO="Support-Team";

let allData=[];
let selectedAgent=null;
let selectedMonth=null;
let selectedPriority=null;

/* CACHE */
const CACHE_KEY="dash_cache_v1";

function saveCache(d){
    localStorage.setItem(CACHE_KEY,JSON.stringify(d));
}

function loadCache(){
    return JSON.parse(localStorage.getItem(CACHE_KEY));
}

/* FETCH */
async function fetchData(force=false){

    const cached=loadCache();
    if(cached && !force){
        allData=cached;
        render();
        return;
    }

    const res=await fetch(
        `https://api.github.com/repos/${OWNER}/${REPO}/issues?state=all&per_page=100`
    );

    const data=await res.json();
    allData=data;
    saveCache(data);
    render();
}

function forceRefresh(){ fetchData(true); }

/* CLEAN TITLE */
function cleanTitle(t){
    return t.replace(/\d{1,2}(st|nd|rd|th)?\s+\w+\s+\d{4}/gi,"").trim();
}

/* DATE */
function getDate(issue){
    const labels=issue.labels?.map(l=>l.name)||[];
    const d=labels.find(l=>l.startsWith("date-"));

    if(d){
        const p=d.replace("date-","").split("-");
        return `${p[0]} ${p[1]} ${p[2]}`;
    }

    const match=issue.title.match(/(\d{1,2}(st|nd|rd|th)?\s+\w+\s+\d{4})/i);
    return match?match[1]:"Not set";
}

/* PRIORITY */
function getPriority(issue){
    const l=(issue.labels||[]).map(x=>x.name.toLowerCase());

    if(l.includes("severe")) return "Severe";
    if(l.includes("high")) return "High";
    if(l.includes("medium")) return "Medium";
    if(l.includes("low")) return "Low";

    return "Low";
}

/* AGENT */
function getAgent(issue){
    const l=issue.labels?.map(x=>x.name)||[];
    const skip=["Severe","Medium","Low","High","date"];
    return l.find(x=>!skip.includes(x))||"Unassigned";
}

/* TOGGLES */
function toggleAgent(a){
    selectedAgent = selectedAgent===a?null:a;
    render();
}

function toggleMonth(m){
    selectedMonth = selectedMonth===m?null:m;
    render();
}

function togglePriority(p){
    selectedPriority = selectedPriority===p?null:p;
    render();
}

/* PRINT */
function printPage() {
    const data = [...allData];

    const selectedData = data
        .filter(i => !selectedAgent || getAgent(i) === selectedAgent)
        .filter(i => !selectedPriority || getPriority(i) === selectedPriority)
        .filter(i => !selectedMonth || getDate(i).includes(selectedMonth));

    const printWindow = window.open("", "_blank");

    printWindow.document.write(`
        <html>
        <head>
        <title>Print Issues</title>
        <style>
            body {
                font-family: Arial;
                padding: 20px;
            }
            .card {
                border: 1px solid #ddd;
                border-radius: 10px;
                padding: 12px;
                margin-bottom: 12px;
            }
            .title {
                font-weight: bold;
                margin-bottom: 6px;
            }
            .meta {
                font-size: 12px;
                color: #666;
                margin-top: 4px;
            }
            .badge {
                display:inline-block;
                padding:3px 8px;
                border-radius:10px;
                font-size:11px;
                margin-right:5px;
            }
            .High { background:#e74c3c; color:white; }
            .Medium { background:#f39c12; color:white; }
            .Low { background:#27ae60; color:white; }
            .Severe { background:#8e44ad; color:white; }
        </style>
        </head>
        <body>

        ${selectedData.map(issue => `
            <div class="card">
                <div class="title">#${issue.number} ${cleanTitle(issue.title)}</div>

                <div>
                    <span class="badge ${getPriority(issue)}">${getPriority(issue)}</span>
                    <span class="badge">${getAgent(issue)}</span>
                </div>

                <div class="meta">
                    📅 Raised: ${getDate(issue)}
                </div>

                <div class="meta" style="margin-top:8px;">
                    ${issue.body || "No description"}
                </div>
            </div>
        `).join("")}

        </body>
        </html>
    `);

    printWindow.document.close();
    printWindow.focus();
    printWindow.print();
}

/* RENDER */
function render(){

    let data=[...allData];

    if(selectedAgent)
        data=data.filter(i=>getAgent(i)===selectedAgent);

    if(selectedMonth)
        data=data.filter(i=>getDate(i).includes(selectedMonth));

    if(selectedPriority)
        data=data.filter(i=>getPriority(i)===selectedPriority);

    document.getElementById("stats").innerHTML=`
        <div class="stat-box">
            <div class="stat-number">${data.length}</div>
            <div>Total Issues</div>
        </div>`;

    /* =========================
       ✅ FIXED MONTH SORTING
       ========================= */

    const MONTH_ORDER = [
        "January","February","March","April","May","June",
        "July","August","September","October","November","December"
    ];

    function extractMonth(issue){
        const d=getDate(issue);
        const parts=d.split(" ");
        return parts[1] || null;
    }

    let months=[...new Set(allData.map(extractMonth))]
        .filter(Boolean)
        .sort((a,b)=> MONTH_ORDER.indexOf(a)-MONTH_ORDER.indexOf(b));

    document.getElementById("monthFilters").innerHTML=
        `<div class="filter-btn ${!selectedMonth?'active':''}" onclick="toggleMonth(null)">All Months</div>`+
        months.map(m=>
            `<div class="filter-btn ${selectedMonth===m?'active':''}" onclick="toggleMonth('${m}')">${m}</div>`
        ).join("");

    /* PRIORITY */
    const priorities=["High","Medium","Low","Severe"]
        .sort((a,b)=>a.localeCompare(b));

    document.getElementById("priorityFilters").innerHTML=
        `<div class="filter-btn ${!selectedPriority?'active':''}" onclick="togglePriority(null)">All Priority</div>`+
        priorities.map(p=>
            `<div class="filter-btn ${selectedPriority===p?'active':''}" onclick="togglePriority('${p}')">${p}</div>`
        ).join("");

    /* AGENTS */
    let agents={};

    data.forEach(i=>{
        const a=getAgent(i);
        agents[a]=(agents[a]||0)+1;
    });

    document.getElementById("teamMembers").innerHTML=
        Object.keys(agents)
        .sort((a,b)=>a.localeCompare(b))
        .map(a=>
            `<div class="member-item ${selectedAgent===a?'active':''}"
                 onclick="toggleAgent('${a}')">
                ${a} <span>${agents[a]}</span>
            </div>`
        ).join("");

    /* CARDS */
    document.getElementById("milestones").innerHTML=
        data.map(issue=>`
        <div class="milestone-card">

            <div class="milestone-header">
                <div>#${issue.number} ${cleanTitle(issue.title)}</div>
                <div style="margin-top:8px;">
                    <span class="badge priority-${getPriority(issue).toLowerCase()}">${getPriority(issue)}</span>
                    <span class="agent-tag">${getAgent(issue)}</span>
                </div>
            </div>

            <div class="milestone-body">
                <div class="description-label">Description</div>
                <div class="description-text">${issue.body||"No description"}</div>
                <div style="margin-top:8px;color:#666;">
                    📅 Raised: ${getDate(issue)}
                </div>
            </div>

        </div>
        `).join("");
}

fetchData();

</script>
</body>
</html>
