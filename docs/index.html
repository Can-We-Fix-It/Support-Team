<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Team Dashboard</title>

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial;
    background: linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    padding:15px;
}

/* ===== CONTAINER ===== */
.container {
    max-width:1200px;
    margin:0 auto;
}

/* ===== HEADER ===== */
header {
    text-align:center;
    color:white;
    margin-bottom:25px;
}

h1 { font-size:2.2em; }
.subtitle { opacity:0.9; }

/* ===== BUTTONS ===== */
.refresh-btn, .print-btn {
    margin-top:10px;
    padding:8px 12px;
    border-radius:8px;
    border:none;
    cursor:pointer;
    font-weight:500;
}

.refresh-btn { background:white; }
.print-btn { background:#111; color:white; }

/* ===== STATS ===== */
.stats {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:10px;
    margin-bottom:15px;
}

/* ===== FILTERS ===== */
#monthFilters,#priorityFilters {
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:15px;
}

.filter-btn {
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
    background:white;
    font-size:13px;
}

.filter-btn.active {
    background:#111;
    color:white;
}

/* ===== CARD ===== */
.milestone-card {
    background:white;
    border-radius:12px;
    margin-bottom:15px;
    overflow:hidden;
}

.milestone-header {
    padding:12px;
    color:white;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

/* ===== BADGES ===== */
.badge {
    padding:3px 8px;
    border-radius:12px;
    font-size:0.7em;
    margin-right:5px;
}

.priority-low { background:#44aa44; color:white; }
.priority-medium { background:#ffaa00; color:white; }
.priority-high { background:#ff8800; color:white; }
.priority-severe { background:#ff4444; color:white; }

.agent-tag {
    background:#111;
    color:white;
    padding:3px 8px;
    border-radius:12px;
    font-size:0.7em;
}

/* ===== DESCRIPTION ===== */
.issue-item {
    padding:12px;
}

.description-label {
    font-weight:600;
    margin-bottom:5px;
}

.description-text {
    white-space:pre-wrap;
    line-height:1.5;
}

/* ===== META ===== */
.meta {
    font-size:0.85em;
    color:#666;
    margin-top:4px;
}

/* ===== MOBILE ===== */
@media (max-width:900px){
    .main-content{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="container">

<header>
<h1>🎯 Support Dashboard</h1>
<p class="subtitle">GitHub Issues Tracking</p>

<button class="refresh-btn" onclick="forceRefresh()">🔄 Refresh</button>
<button class="print-btn" onclick="window.print()">🖨 Print</button>
</header>

<div class="stats" id="stats"></div>

<div id="monthFilters"></div>
<div id="priorityFilters"></div>

<div id="milestones"></div>

</div>

<script>

const OWNER="Can-We-Fix-It";
const REPO="Support-Team";
const CACHE_KEY="dash_cache_v3";

let allData=[];
let selectedMonth=null;
let selectedPriority=null;

/* ===== CACHE ===== */
function saveCache(data){
    localStorage.setItem(CACHE_KEY,JSON.stringify({data,t:Date.now()}));
}
function loadCache(){
    return JSON.parse(localStorage.getItem(CACHE_KEY)||"null");
}

/* ===== TITLE DATE PARSER ===== */
function extractTitleDate(title){
    const match = title.match(/(\d{1,2})(st|nd|rd|th)?\s+([A-Za-z]+)\s+(\d{4})/);
    if(!match) return null;
    return { day:match[1], month:match[3], year:match[4], text:match[0] };
}

/* ===== PRIORITY FIXED ===== */
function getPriority(issue){
    const labels = issue.labels?.map(l=>l.name)||[];

    if(labels.includes("Severe")) return "Severe";
    if(labels.includes("High")) return "High";
    if(labels.includes("Medium")) return "Medium";
    return "Low";
}

/* ===== MONTH ===== */
function getMonth(issue){
    const t = extractTitleDate(issue.title);
    if(t) return t.month;

    const labels = issue.labels?.map(l=>l.name)||[];
    const d = labels.find(l=>l.startsWith("date-"));
    if(!d) return "unknown";

    return d.replace("date-","").split("-")[1];
}

/* ===== RAISED ===== */
function getRaised(issue){
    const t = extractTitleDate(issue.title);
    if(t) return `${t.day} ${t.month} ${t.year}`;

    const labels = issue.labels?.map(l=>l.name)||[];
    const d = labels.find(l=>l.startsWith("date-"));
    if(!d) return "Not set";

    const p=d.replace("date-","").split("-");
    return `${p[0]} ${p[1]} ${p[2]}`;
}

/* ===== FETCH ===== */
async function fetchData(force=false){
    const cached=loadCache();

    if(cached&&!force){
        allData=cached.data;
        render();
        return;
    }

    const res=await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/issues?state=all&per_page=100`);
    const data=await res.json();

    allData=data;
    saveCache(data);
    render();
}

function forceRefresh(){fetchData(true);}

/* ===== FILTERS ===== */
function selectMonth(m){selectedMonth=selectedMonth===m?null:m;render();}
function selectPriority(p){selectedPriority=selectedPriority===p?null:p;render();}

/* ===== RENDER ===== */
function render(){

let data=[...allData];

if(selectedMonth) data=data.filter(i=>getMonth(i)===selectedMonth);
if(selectedPriority) data=data.filter(i=>getPriority(i)===selectedPriority);

/* stats */
document.getElementById("stats").innerHTML=
`<div class="stats">
<div class="stat-box"><div class="stat-number">${data.length}</div><div>Total Issues</div></div>
</div>`;

/* months */
const months=[...new Set(allData.map(getMonth).filter(m=>m!=="unknown"))];
document.getElementById("monthFilters")=
document.getElementById("monthFilters").innerHTML=
`<div class="filter-btn ${!selectedMonth?'active':''}" onclick="selectMonth(null)">All Months</div>`
+months.map(m=>`<div class="filter-btn ${selectedMonth===m?'active':''}" onclick="selectMonth('${m}')">${m}</div>`).join("");

/* priority */
document.getElementById("priorityFilters").innerHTML=
`<div class="filter-btn ${!selectedPriority?'active':''}" onclick="selectPriority(null)">All Priority</div>`
+["Severe","High","Medium","Low"].map(p=>`
<div class="filter-btn ${selectedPriority===p?'active':''}" onclick="selectPriority('${p}')">${p}</div>
`).join("");

/* cards */
document.getElementById("milestones").innerHTML=
data.map(i=>{

const t=extractTitleDate(i.title);
let title=i.title;
if(t) title=title.replace(t.text,"").trim();

return `
<div class="milestone-card">

<div class="milestone-header">
<div>#${i.number} ${title}</div>

<div style="margin-top:8px;">
<span class="badge priority-${getPriority(i).toLowerCase()}">${getPriority(i)}</span>
<span class="agent-tag">${(i.labels?.map(l=>l.name).find(l=>!["Severe","High","Medium","Low"].includes(l)))||"Unassigned"}</span>
</div>

</div>

<div class="issue-item">

<div class="description-label">Description:</div>
<div class="description-text">${i.body||"No description"}</div>

<div class="meta">Created: ${new Date(i.created_at).toLocaleDateString()}</div>
<div class="meta">📅 Raised: ${getRaised(i)}</div>
<div class="meta">Updated: ${new Date(i.updated_at).toLocaleDateString()}</div>

</div>

</div>`;
}).join("");

}

fetchData();

</script>

</body>
</html>
