<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GitHub Milestones</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        padding: 20px;
    }

    #milestone-container {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
    }

    .milestone-card {
        background: #fff;
        padding: 15px;
        width: 280px;
        border-radius: 10px;
        border: 1px solid #ddd;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .priority-badge {
        display: inline-block;
        padding: 5px 10px;
        border-radius: 6px;
        color: white;
        font-weight: bold;
        margin-bottom: 10px;
    }

    .priority-high { background: #e74c3c; }
    .priority-medium { background: #f1c40f; color: black; }
    .priority-low { background: #2ecc71; }
    .priority-none { background: #7f8c8d; }
</style>
</head>

<body>

<h1>GitHub Milestones</h1>

<div id="milestone-container"></div>

<script>
const owner = "can-we-fix-it";   // change if needed
const repo = "Support-Team";     // change if needed

async function loadMilestones() {
    const url = `https://api.github.com/repos/${owner}/${repo}/milestones?state=open`;

    try {
        const response = await fetch(url, {
            headers: { "Accept": "application/vnd.github+json" }
        });

        if (!response.ok) {
            throw new Error(`GitHub API error: ${response.status}`);
        }

        const milestones = await response.json();
        renderMilestoneCards(milestones);

    } catch (error) {
        console.error("Error loading milestones:", error);
        document.getElementById("milestone-container").innerHTML =
            `<p>Unable to load milestones.</p>`;
    }
}

function extractPriority(milestone) {
    // 1️⃣ Check labels for priority
    if (milestone.labels) {
        const label = milestone.labels.find(l =>
            l.name.toLowerCase().includes("priority")
        );
        if (label) {
            return label.name.replace(/priority[: ]*/i, "").trim();
        }
    }

    // 2️⃣ Check description for "Priority: X"
    if (milestone.description) {
        const match = milestone.description.match(/priority[:\- ]+(\w+)/i);
        if (match) {
            return match[1];
        }
    }

    // 3️⃣ Default
    return "None";
}

function priorityClass(priority) {
    switch (priority.toLowerCase()) {
        case "high": return "priority-high";
        case "medium": return "priority-medium";
        case "low": return "priority-low";
        default: return "priority-none";
    }
}

function renderMilestoneCards(milestones) {
    const container = document.getElementById("milestone-container");
    container.innerHTML = "";

    milestones.forEach(m => {
        const priority = extractPriority(m);
        const badgeClass = priorityClass(priority);

        const card = document.createElement("div");
        card.className = "milestone-card";

        card.innerHTML = `
            <span class="priority-badge ${badgeClass}">
                ${priority}
            </span>

            <h3>${m.title}</h3>

            <p><strong>Due:</strong> 
                ${m.due_on ? new Date(m.due_on).toLocaleDateString() : "None"}
            </p>

            <p>${m.description || ""}</p>

            <a href="${m.html_url}" target="_blank">View on GitHub</a>
        `;

        container.appendChild(card);
    });
}

loadMilestones();
</script>

</body>
</html>
