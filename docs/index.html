<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Team Dashboard</title>

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial;
    background: linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    padding:15px;
}

/* ===== CONTAINER ===== */
.container {
    max-width:1200px;
    margin:0 auto;
}

/* ===== HEADER ===== */
header {
    text-align:center;
    color:white;
    margin-bottom:25px;
}

h1 {
    font-size:2.2em;
}

.subtitle {
    opacity:0.9;
}

/* ===== BUTTONS ===== */
.refresh-btn {
    margin-top:10px;
    padding:8px 12px;
    border-radius:8px;
    border:none;
    cursor:pointer;
    background:white;
    font-weight:500;
    transition:0.2s;
    margin-right:8px;
}

.refresh-btn:hover {
    transform:scale(1.03);
}

/* ===== STATS ===== */
.stats {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:10px;
    margin-bottom:15px;
}

/* ===== MONTH FILTER ===== */
#monthFilters {
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.month-btn {
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
    background:white;
    color:black;
    font-size:13px;
    transition:0.2s;
}

.month-btn.active {
    background:#111;
    color:white;
}

/* ===== STATS BOX ===== */
.stat-box {
    background:white;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

.stat-number {
    font-size:1.8em;
    color:#667eea;
    font-weight:bold;
}

/* ===== LAYOUT ===== */
.main-content {
    display:grid;
    grid-template-columns:260px 1fr;
    gap:15px;
}

/* ===== TEAM LIST ===== */
.team-members {
    background:white;
    border-radius:12px;
    padding:8px;
    height:fit-content;
}

/* desktop sticky */
@media (min-width: 901px) {
    .team-members {
        position: sticky;
        top: 10px;
    }
}

.member-item {
    padding:10px;
    border-bottom:1px solid #eee;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
    font-size:0.9em;
    transition:0.2s;
}

.member-item:hover {
    background:#f5f5f5;
}

.member-item.active {
    background:#667eea;
    color:white;
}

/* ===== ISSUE CARD ===== */
.milestone-card {
    background:white;
    border-radius:12px;
    margin-bottom:15px;
    overflow:hidden;
}

.milestone-header {
    padding:12px;
    color:white;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

.milestone-header div:first-child {
    font-weight:600;
    word-break:break-word;
}

/* ===== BADGES ===== */
.badge {
    padding:3px 8px;
    border-radius:12px;
    font-size:0.7em;
    margin-right:5px;
}

.priority-low { background:#44aa44; color:white; }
.priority-medium { background:#ffaa00; color:white; }
.priority-severe { background:#ff4444; color:white; }

.agent-tag {
    background:#111;
    color:white;
    padding:3px 8px;
    border-radius:12px;
    font-size:0.7em;
}

/* ===== ISSUE BODY ===== */
.issue-item {
    padding:12px;
}

.description-label {
    font-weight:600;
    margin-bottom:5px;
    color:#333;
}

.description-text {
    white-space:pre-wrap;
    line-height:1.5;
    color:#222;
}

/* ===== META ===== */
.meta {
    font-size:0.85em;
    color:#666;
    margin-top:4px;
}

/* ===== MOBILE ===== */
@media (max-width: 900px) {

    .main-content {
        grid-template-columns:1fr;
    }

    .team-members {
        position:relative;
        display:flex;
        overflow-x:auto;
        white-space:nowrap;
        gap:8px;
        padding:10px;
    }

    .member-item {
        min-width:140px;
        border-bottom:none;
        border-right:1px solid #eee;
        flex-direction:column;
        align-items:flex-start;
        gap:5px;
    }

    h1 {
        font-size:1.6em;
    }

    .stats {
        grid-template-columns:repeat(2,1fr);
    }
}
</style>
</head>

<body>

<div class="container">

<header>
<h1>🎯 Support Dashboard</h1>
<p class="subtitle">GitHub Issues Tracking</p>

<button class="refresh-btn" onclick="forceRefresh()">🔄 Refresh</button>
<button class="refresh-btn" onclick="printView()">🖨️ Print View</button>

</header>

<div class="stats" id="stats"></div>
<div id="monthFilters"></div>

<div class="main-content">
    <div class="team-members" id="teamMembers"></div>
    <div id="milestones"></div>
</div>

</div>

<script>

const OWNER = "Can-We-Fix-It";
const REPO = "Support-Team";
const CACHE_KEY = "dash_cache_v3";

let allData = [];
let selectedAgent = null;
let selectedMonth = null;

/* ===== CACHE ===== */
function saveCache(data){
    localStorage.setItem(CACHE_KEY, JSON.stringify(data));
}

function loadCache(){
    const c = localStorage.getItem(CACHE_KEY);
    return c ? JSON.parse(c) : null;
}

/* ===== FETCH ===== */
async function fetchData(force=false){

    if(!force){
        const cached = loadCache();
        if(cached){
            allData = cached;
            render();
            return;
        }
    }

    const res = await fetch(
        `https://api.github.com/repos/${OWNER}/${REPO}/issues?state=all&per_page=100`
    );

    const data = await res.json();
    allData = Array.isArray(data) ? data : [];

    saveCache(allData);
    render();
}

function forceRefresh(){
    fetchData(true);
}

/* ===== LOGIC ===== */
function getPriority(issue){
    const labels = issue.labels?.map(l=>l.name)||[];
    if(labels.includes("Severe")) return "Severe";
    if(labels.includes("Medium")) return "Medium";
    return "Low";
}

function getAgent(issue){
    const labels = issue.labels?.map(l=>l.name)||[];
    const ignore = ["Severe","Medium","Low"];
    return labels.find(l=>!ignore.includes(l)) || "Unassigned";
}

function getMonth(issue){
    const labels = issue.labels?.map(l=>l.name.toLowerCase())||[];
    const d = labels.find(l=>l.startsWith("date-"));
    if(!d) return null;
    const parts = d.replace("date-","").split("-");
    return parts[1]?.charAt(0).toUpperCase()+parts[1]?.slice(1);
}

/* label date */
function getRaisedFromLabel(issue){
    const labels = issue.labels?.map(l=>l.name)||[];
    const d = labels.find(l=>l.startsWith("date-"));
    if(!d) return null;
    const p = d.replace("date-","").split("-");
    return `${p[0]} ${p[1]} ${p[2]}`;
}

/* title date */
function getRaisedFromTitle(title){
    const match = title.match(/(\d{1,2}(st|nd|rd|th)?\s+[A-Za-z]+\s+\d{4})/i);
    return match ? match[1] : null;
}

/* final */
function getRaised(issue){
    return getRaisedFromLabel(issue)
        || getRaisedFromTitle(issue.title)
        || new Date(issue.created_at).toLocaleDateString();
}

/* ===== FILTERS ===== */
function selectAgent(a){
    selectedAgent = selectedAgent === a ? null : a;
    render();
}

function selectMonth(m){
    selectedMonth = selectedMonth === m ? null : m;
    render();
}

/* ===== PRINT ===== */
function printView(){

    const data = allData
        .filter(i => !selectedAgent || getAgent(i) === selectedAgent)
        .filter(i => !selectedMonth || getMonth(i) === selectedMonth);

    const html = data.map(i => `
        <div style="page-break-inside:avoid;margin-bottom:20px;font-family:Arial;border:1px solid #ddd;padding:12px;border-radius:8px;">
            <h3>#${i.number} ${i.title}</h3>
            <div style="font-size:12px;margin-bottom:8px;">
                ${getAgent(i)} | ${getPriority(i)}
            </div>
            <div style="white-space:pre-wrap;margin-bottom:10px;">
                ${i.body || "No description"}
            </div>
            <div style="font-size:11px;color:#555;">
                Raised: ${getRaised(i)}
            </div>
        </div>
    `).join("");

    const win = window.open("", "_blank");
    win.document.write(`<html><body>${html}<script>window.print()<\/script></body></html>`);
    win.document.close();
}

/* ===== RENDER ===== */
function render(){

    let data = allData;

    if(selectedAgent){
        data = data.filter(i=>getAgent(i)===selectedAgent);
    }

    if(selectedMonth){
        data = data.filter(i=>getMonth(i)===selectedMonth);
    }

    document.getElementById("stats").innerHTML =
        `<div class="stat-box">
            <div class="stat-number">${data.length}</div>
            <div>Total Issues</div>
        </div>`;

    const months = [...new Set(allData.map(getMonth).filter(Boolean))];

    document.getElementById("monthFilters").innerHTML =
        `<div class="month-btn ${!selectedMonth?'active':''}" onclick="selectMonth(null)">All</div>` +
        months.map(m =>
            `<div class="month-btn ${selectedMonth===m?'active':''}" onclick="selectMonth('${m}')">${m}</div>`
        ).join("");

    const grouped = {};
    data.forEach(i=>{
        const a = getAgent(i);
        grouped[a] = grouped[a] || [];
        grouped[a].push(i);
    });

    document.getElementById("teamMembers").innerHTML =
        Object.keys(grouped).sort().map(a=>
            `<div class="member-item ${selectedAgent===a?'active':''}" onclick="selectAgent('${a}')">
                <div>${a}</div><div>${grouped[a].length}</div>
            </div>`
        ).join("");

    document.getElementById("milestones").innerHTML =
        data.map(i=>`
        <div class="milestone-card">

            <div class="milestone-header">
                <div>#${i.number} ${i.title}</div>
                <div style="margin-top:8px;">
                    <span class="badge priority-${getPriority(i).toLowerCase()}">${getPriority(i)}</span>
                    <span class="agent-tag">${getAgent(i)}</span>
                </div>
            </div>

            <div class="issue-item">
                <div class="description-label">Description:</div>
                <div class="description-text">${i.body||""}</div>

                <div class="meta">📅 Raised: ${getRaised(i)}</div>
                <div class="meta">Created: ${new Date(i.created_at).toLocaleDateString()}</div>
            </div>

        </div>
        `).join("");
}

fetchData();

</script>

</body>
</html>
