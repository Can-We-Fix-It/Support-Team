<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Team - Issue Tracking Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 20px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        .stat-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 25px;
            margin-bottom: 40px;
        }

        .team-members {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .team-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            font-weight: bold;
            text-align: center;
        }

        .member-item {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .member-item:hover {
            background: #f5f5f5;
        }

        .member-item.active {
            background: #667eea;
            color: white;
            font-weight: bold;
        }

        .member-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .member-badge {
            background: #667eea;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
        }

        .member-item.active .member-badge {
            background: white;
            color: #667eea;
        }

        .severity-filter {
            display: flex;
            gap: 8px;
            padding: 15px 20px;
            border-top: 1px solid #eee;
            background: #f9f9f9;
            flex-wrap: wrap;
        }

        .filter-btn {
            flex: 1;
            min-width: 70px;
            padding: 8px 12px;
            border: 2px solid;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.75em;
            transition: all 0.2s ease;
            background: white;
        }

        .filter-btn.severe { border-color: #ff4444; color: #ff4444; }
        .filter-btn.medium { border-color: #ffaa00; color: #ffaa00; }
        .filter-btn.low { border-color: #44aa44; color: #44aa44; }

        .filter-btn.active.severe { background: #ff4444; color: white; }
        .filter-btn.active.medium { background: #ffaa00; color: white; }
        .filter-btn.active.low { background: #44aa44; color: white; }

        .milestones {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .milestone-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .milestone-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
        }

        .milestone-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
        }

        .progress-bar {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
            margin-bottom: 8px;
            margin-top: 12px;
        }

        .progress-fill {
            background: #4ade80;
            height: 100%;
        }

        .milestone-content {
            padding: 20px;
        }

        .issue-item {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .loading, .empty-state {
            text-align: center;
            padding: 40px;
            color: white;
        }

        .refresh-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>

<body>
<div class="container">
    <header>
        <h1>🎯 Support Dashboard</h1>
        <p class="subtitle">GitHub Issue Tracker</p>
        <button class="refresh-btn" onclick="fetchAndRender()">🔄 Refresh</button>
    </header>

    <div id="milestones" class="loading">Loading...</div>
</div>

<script>
const REPO_OWNER = 'Can-We-Fix-It';
const REPO_NAME = 'Support-Team';
const STORAGE_KEY = 'supportTeamDashboard_completed';

// 🔐 PUT YOUR NEW TOKEN HERE (classic token with repo access)
const GITHUB_TOKEN = "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";

// ---------------- STATE ----------------
let allIssues = [];
let selectedMember = null;
let selectedSeverityFilter = null;

// ---------------- HEADERS ----------------
function getHeaders() {
    return {
        "Accept": "application/vnd.github.v3+json"
    };
}
    
// ---------------- SAFE ERROR HANDLING ----------------
function getEl(id) {
    return document.getElementById(id);
}

function showError(message) {
    const el = getEl('error');
    if (!el) return;
    el.innerHTML = `<div class="error">⚠️ ${message}</div>`;
}

function clearError() {
    const el = getEl('error');
    if (!el) return;
    el.innerHTML = '';
}

// ---------------- FETCH ISSUES ----------------
async function test() {
    const res = await fetch("https://api.github.com/repos/Can-We-Fix-It/Support-Team/issues?state=all");
    const data = await res.json();
    console.log("ISSUES:", data);
}

test();

// ---------------- MAIN LOAD ----------------
async function fetchAndRender() {
    document.getElementById('milestones').innerHTML =
        '<div class="loading">Loading issues...</div>';

    const res = await fetch(
        "https://api.github.com/repos/Can-We-Fix-It/Support-Team/issues?state=all"
    );

    const issues = await res.json();

    console.log("ISSUES:", issues);

    allMilestones = [{
        title: "All Issues",
        issues: issues
    }];

    renderTeamMembers(allMilestones);
    renderDashboard(allMilestones);
}

// ---------------- STATS ----------------
function renderStats(issues) {
    const total = issues.length;

    const stats = `
        <div class="stat-box">
            <div class="stat-number">${total}</div>
            <div class="stat-label">Total Issues</div>
        </div>
    `;

    const el = getEl('stats');
    if (el) el.innerHTML = stats;
}

// ---------------- TEAM MEMBERS (ASSIGNEES) ----------------
function renderTeamMembers(issues) {
    const el = getEl('teamMembers');
    if (!el) return;

    const agentMap = new Map();

    // 🔥 Build agents dynamically from labels
    issues.forEach(issue => {
        const labels = issue.labels || [];

        labels.forEach(label => {
            const name = label.name;

            // ignore severity labels
            if (["Severe", "Medium", "Low"].includes(name)) return;

            // treat EVERYTHING else as agent
            if (!agentMap.has(name)) {
                agentMap.set(name, {
                    total: 0,
                    severe: 0,
                    medium: 0,
                    low: 0
                });
            }

            const data = agentMap.get(name);
            data.total++;

            const priority = getPriority(issue);
            if (priority === "Severe") data.severe++;
            if (priority === "Medium") data.medium++;
            if (priority === "Low") data.low++;
        });
    });

    let html = '';

    agentMap.forEach((data, agent) => {

        html += `
            <div class="member-item ${selectedAgent === agent ? 'active' : ''}"
                 onclick="selectAgent('${agent}')">

                <div class="member-info">
                    <span class="member-name">${agent}</span>

                    <span class="member-severity-badge severity-severe-badge">🔴 ${data.severe}</span>
                    <span class="member-severity-badge severity-medium-badge">🟠 ${data.medium}</span>
                    <span class="member-severity-badge severity-low-badge">🟢 ${data.low}</span>
                </div>

                <span class="member-badge">${data.total}</span>
            </div>
        `;
    });

    el.innerHTML = html;
}

// ---------------- SELECT MEMBER ----------------
function selectMember(member) {
    selectedMember = selectedMember === member ? null : member;
    renderIssues(allIssues);
}

// ---------------- SEVERITY FILTER ----------------
function getPriority(issue) {
    if (!issue.labels) return null;

    for (let label of issue.labels) {
        if (label.name === 'Severe' || label.name === 'Medium' || label.name === 'Low') {
            return label.name;
        }
    }
    return null;
}

function toggleSeverityFilter(severity) {
    selectedSeverityFilter =
        selectedSeverityFilter === severity ? null : severity;

    renderIssues(allIssues);
}

// ---------------- RENDER ISSUES ----------------
function renderIssues(issues) {
    const container = getEl('milestones');
    if (!container) return;

    let filtered = issues;

    // filter by member
    if (selectedMember) {
        filtered = filtered.filter(i =>
            (i.assignee?.login || 'Unassigned') === selectedMember
        );
    }

    // filter by severity
    if (selectedSeverityFilter) {
        filtered = filtered.filter(i =>
            getPriority(i) === selectedSeverityFilter
        );
    }

    let html = '';

    filtered.forEach(issue => {
        const severity = getPriority(issue);
        const assignee = issue.assignee?.login || 'Unassigned';

        html += `
            <div class="milestone-card">
                <div class="milestone-header">
                    <div class="milestone-title">
                        ${issue.title}
                    </div>
                    <div class="progress-text">
                        #${issue.number}
                    </div>
                </div>

                <div class="milestone-content">
                    <div class="issue-item">
                        <div class="issue-title">
                            ${issue.body ? issue.body.substring(0, 200) : 'No description'}
                        </div>

                        <div class="issue-meta">
                            <div class="meta-item"><b>Assignee:</b> ${assignee}</div>
                            ${severity ? `<div class="meta-item"><b>Priority:</b> ${severity}</div>` : ''}
                        </div>

                        <a class="issue-link" href="${issue.html_url}" target="_blank">
                            View on GitHub →
                        </a>
                    </div>
                </div>
            </div>
        `;
    });

    container.innerHTML = html;
}

// ---------------- INIT ----------------
window.addEventListener('DOMContentLoaded', () => {
    fetchAndRender();
    setInterval(fetchAndRender, 60000);
});
</script>
</body>
</html>
