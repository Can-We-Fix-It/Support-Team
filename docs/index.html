<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #667eea;
    padding: 20px;
    color: white;
}

.container { max-width: 1200px; margin: auto; }

.milestone {
    background: white;
    color: black;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
}

.issue {
    padding: 10px;
    margin: 8px 0;
    background: #f2f2f2;
    border-radius: 6px;
}
</style>
</head>

<body>
<div class="container">

<h1>🎯 Support Dashboard</h1>

<div id="output">Loading...</div>

</div>

<script>
const REPO_OWNER = "Can-We-Fix-It";
const REPO_NAME = "Support-Team";

/* 🔴 PUT YOUR TOKEN HERE */
const GITHUB_TOKEN = "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";

/* =========================
   PRIORITY FIX
========================= */
function getPriorityFromIssue(issue) {
    if (!issue.labels) return null;

    const labels = issue.labels.map(l => l.name.toLowerCase());

    if (labels.some(l =>
        l.includes("severe") ||
        l.includes("p0") ||
        l.includes("p1") ||
        l.includes("high") ||
        l.includes("urgent")
    )) return "Severe";

    if (labels.some(l =>
        l.includes("medium") ||
        l.includes("p2")
    )) return "Medium";

    if (labels.some(l =>
        l.includes("low") ||
        l.includes("p3")
    )) return "Low";

    return null;
}

/* =========================
   FETCH HELPERS (FIXED 403)
========================= */
async function fetchAPI(url) {
    const res = await fetch(url, {
        headers: {
            Authorization: `Bearer ${GITHUB_TOKEN}`,
            Accept: "application/vnd.github+json"
        }
    });

    if (!res.ok) {
        throw new Error("GitHub API error: " + res.status);
    }

    return res.json();
}

/* ========================= */

async function load() {
    try {
        document.getElementById("output").innerHTML = "Loading...";

        const milestones = await fetchAPI(
            `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/milestones?state=all`
        );

        let html = "";

        for (let m of milestones) {

            const issues = await fetchAPI(
                `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues?milestone=${m.number}&state=all`
            );

            let issueHTML = "";

            for (let i of issues) {
                const priority = getPriorityFromIssue(i);

                issueHTML += `
                    <div class="issue">
                        <b>${i.title}</b><br>
                        Priority: ${priority || "None"}
                    </div>
                `;
            }

            html += `
                <div class="milestone">
                    <h2>${m.title}</h2>
                    ${issueHTML}
                </div>
            `;
        }

        document.getElementById("output").innerHTML = html;

    } catch (err) {
        document.getElementById("output").innerHTML =
            "❌ Error: " + err.message;
    }
}

load();
</script>

</body>
</html>
