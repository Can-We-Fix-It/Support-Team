<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Team Dashboard</title>

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial;
    background: linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    padding:15px;
}

.container {
    max-width:1200px;
    margin:0 auto;
}

/* HEADER */
header {
    text-align:center;
    color:white;
    margin-bottom:25px;
}

h1 { font-size:2.2em; }
.subtitle { opacity:0.9; }

/* BUTTONS ROW (filters now horizontal) */
.filter-row {
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:15px;
}

/* FILTER BUTTONS */
.filter-btn {
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
    background:white;
    font-size:13px;
    transition:0.2s;
}

.filter-btn.active {
    background:#111;
    color:white;
}

/* STATS */
.stats {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:10px;
    margin-bottom:15px;
}

.stat-box {
    background:white;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

.stat-number {
    font-size:1.8em;
    color:#667eea;
    font-weight:bold;
}

/* ISSUE CARD */
.milestone-card {
    background:white;
    border-radius:12px;
    margin-bottom:15px;
    overflow:hidden;
}

.milestone-header {
    padding:12px;
    color:white;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

.badge {
    padding:3px 8px;
    border-radius:12px;
    font-size:0.7em;
    margin-right:5px;
}

.priority-low { background:#44aa44; color:white; }
.priority-medium { background:#ffaa00; color:white; }
.priority-high { background:#ff8800; color:white; }
.priority-severe { background:#ff4444; color:white; }

.agent-tag {
    background:#111;
    color:white;
    padding:3px 8px;
    border-radius:12px;
    font-size:0.7em;
}

/* BODY */
.issue-item {
    padding:12px;
}

.description-label {
    font-weight:600;
    margin-bottom:5px;
    color:#333;
}

.description-text {
    white-space:pre-wrap;
    line-height:1.5;
    color:#222;
    margin-bottom:10px;

    /* FIX IMAGE BREAKING BOX */
    overflow:hidden;
}

.description-text img {
    max-width:100%;
    height:auto;
    display:block;
    margin-top:8px;
}

/* META */
.meta {
    font-size:0.85em;
    color:#666;
    margin-top:4px;
}

/* PRINT */
.print-btn {
    margin-top:10px;
    padding:6px 10px;
    border-radius:8px;
    background:#111;
    color:white;
    border:none;
    cursor:pointer;
    font-size:12px;
}

/* MOBILE */
@media (max-width:900px) {
    h1 { font-size:1.6em; }
}
</style>
</head>

<body>

<div class="container">

<header>
<h1>🎯 Support Dashboard</h1>
<p class="subtitle">GitHub Issues Tracking</p>
</header>

<div class="stats" id="stats"></div>

<!-- FILTERS -->
<div class="filter-row" id="monthFilters"></div>
<div class="filter-row" id="priorityFilters"></div>
<div class="filter-row" id="agentFilters"></div>

<div id="milestones"></div>

</div>

<script>

const OWNER = "Can-We-Fix-It";
const REPO = "Support-Team";

let allData = [];
let selectedMonth = null;
let selectedPriority = null;
let selectedAgent = null;

/* ---------------- PRIORITY ---------------- */
function getPriority(issue) {
    const labels = issue.labels?.map(l => l.name.toLowerCase()) || [];

    if (labels.includes("severe")) return "Severe";
    if (labels.includes("high")) return "High";
    if (labels.includes("medium")) return "Medium";
    if (labels.includes("low")) return "Low";

    return "Low";
}

/* ---------------- AGENT ---------------- */
function getAgent(issue) {
    const labels = issue.labels?.map(l => l.name) || [];
    const reserved = ["Severe","High","Medium","Low"];
    return labels.find(l => !reserved.includes(l)) || "Unassigned";
}

/* ---------------- MONTH FROM TITLE OR LABEL ---------------- */
function extractDate(issue) {

    // 1. try label
    const labels = issue.labels?.map(l => l.name.toLowerCase()) || [];
    let dateLabel = labels.find(l => l.startsWith("date-"));

    let text = issue.title;

    // 2. try title format like "4th June 2026"
    const match = issue.title.match(/(\d{1,2})(st|nd|rd|th)?\s([A-Za-z]+)\s(\d{4})/);

    if (match) {
        return {
            full: match[0],
            month: match[3].toLowerCase()
        };
    }

    if (dateLabel) {
        const parts = dateLabel.replace("date-","").split("-");
        return {
            full: `${parts[0]} ${parts[1]} ${parts[2]}`,
            month: parts[1].toLowerCase()
        };
    }

    return { full:"Not set", month:"unknown" };
}

/* ---------------- FETCH ---------------- */
async function fetchData() {
    const res = await fetch(
        `https://api.github.com/repos/${OWNER}/${REPO}/issues?state=all&per_page=100`
    );

    const data = await res.json();
    if (!Array.isArray(data)) return;

    allData = data;
    render();
}

/* ---------------- FILTERS ---------------- */
function toggleMonth(m) {
    selectedMonth = selectedMonth === m ? null : m;
    render();
}

function togglePriority(p) {
    selectedPriority = selectedPriority === p ? null : p;
    render();
}

function toggleAgent(a) {
    selectedAgent = selectedAgent === a ? null : a;
    render();
}

/* ---------------- RENDER ---------------- */
function render() {

    let data = allData;

    if (selectedMonth) {
        data = data.filter(i => extractDate(i).month === selectedMonth);
    }

    if (selectedPriority) {
        data = data.filter(i => getPriority(i) === selectedPriority);
    }

    if (selectedAgent) {
        data = data.filter(i => getAgent(i) === selectedAgent);
    }

    /* STATS */
    document.getElementById("stats").innerHTML = `
        <div class="stat-box">
            <div class="stat-number">${data.length}</div>
            <div>Total Issues</div>
        </div>
    `;

    /* MONTH FILTER */
    const months = [...new Set(allData.map(i => extractDate(i).month).filter(m => m !== "unknown"))];

    document.getElementById("monthFilters").innerHTML =
        `<div class="filter-btn ${!selectedMonth?'active':''}" onclick="toggleMonth(null)">All Months</div>` +
        months.map(m =>
            `<div class="filter-btn ${selectedMonth===m?'active':''}" onclick="toggleMonth('${m}')">${m}</div>`
        ).join("");

    /* PRIORITY FILTER */
    const priorities = ["Low","Medium","High","Severe"];

    document.getElementById("priorityFilters").innerHTML =
        `<div class="filter-btn ${!selectedPriority?'active':''}" onclick="togglePriority(null)">All Priority</div>` +
        priorities.map(p =>
            `<div class="filter-btn ${selectedPriority===p?'active':''}" onclick="togglePriority('${p}')">${p}</div>`
        ).join("");

    /* AGENT FILTER */
    const agents = [...new Set(allData.map(getAgent))];

    document.getElementById("agentFilters").innerHTML =
        `<div class="filter-btn ${!selectedAgent?'active':''}" onclick="toggleAgent(null)">All Agents</div>` +
        agents.map(a =>
            `<div class="filter-btn ${selectedAgent===a?'active':''}" onclick="toggleAgent('${a}')">${a}</div>`
        ).join("");

    /* CARDS */
    let html = "";

    data.forEach(issue => {

        const priority = getPriority(issue);
        const agent = getAgent(issue);
        const date = extractDate(issue);

        const desc = issue.body || "No description provided.";

        html += `
        <div class="milestone-card">

            <div class="milestone-header">
                <div>#${issue.number} ${issue.title}</div>
                <div style="margin-top:8px;">
                    <span class="badge priority-${priority.toLowerCase()}">${priority}</span>
                    <span class="agent-tag">${agent}</span>
                </div>
            </div>

            <div class="issue-item">

                <div class="description-label">Description:</div>
                <div class="description-text">${desc}</div>

                <div class="meta">📅 Raised: ${date.full}</div>
                <div class="meta">Created: ${new Date(issue.created_at).toLocaleDateString()}</div>
                <div class="meta">Updated: ${new Date(issue.updated_at).toLocaleDateString()}</div>

                <a class="meta" href="${issue.html_url}" target="_blank">
                    View on GitHub →
                </a>

                <button class="print-btn" onclick="window.print()">
                    Print
                </button>

            </div>

        </div>`;
    });

    document.getElementById("milestones").innerHTML = html;
}

fetchData();

</script>

</body>
</html>
