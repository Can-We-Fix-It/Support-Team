<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    color: white;
}

.container {
    max-width: 1200px;
    margin: auto;
    padding: 20px;
}

header {
    text-align: center;
    padding: 20px;
}

button {
    padding: 10px 15px;
    border: none;
    cursor: pointer;
    border-radius: 6px;
}

.refresh-btn {
    background: white;
    color: #667eea;
    font-weight: bold;
}

.stats {
    display: flex;
    gap: 10px;
    margin: 20px 0;
}

.stat {
    background: white;
    color: black;
    padding: 15px;
    border-radius: 10px;
    flex: 1;
    text-align: center;
}

.main {
    display: flex;
    gap: 20px;
}

.sidebar {
    width: 250px;
    background: white;
    color: black;
    border-radius: 10px;
    overflow: hidden;
}

.member {
    padding: 10px;
    border-bottom: 1px solid #eee;
    cursor: pointer;
}

.member.active {
    background: #667eea;
    color: white;
}

.board {
    flex: 1;
}

.card {
    background: white;
    color: black;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
}

.badge {
    padding: 3px 8px;
    border-radius: 5px;
    font-size: 12px;
    color: white;
}

.low { background: green; }
.medium { background: orange; }
.high { background: red; }
.urgent { background: darkred; }
</style>
</head>

<body>

<div class="container">

<header>
    <h1>Support Dashboard</h1>
    <button class="refresh-btn" onclick="loadData()">Refresh</button>
</header>

<div class="stats" id="stats"></div>

<div class="main">
    <div class="sidebar" id="members"></div>
    <div class="board" id="issues"></div>
</div>

</div>

<script>
const OWNER = "Can-We-Fix-It";
const REPO = "Support-Team";

let allIssues = [];
let selectedUser = null;

/* ---------------- FETCH ---------------- */

async function fetchIssues() {
    const res = await fetch(
        `https://api.github.com/repos/${OWNER}/${REPO}/issues?state=all&per_page=100`
    );
    return await res.json();
}

/* ---------------- PRIORITY FIX (IMPORTANT) ---------------- */

function getPriority(issue) {

    // ✅ NEW: ISSUE FIELDS (correct way)
    if (issue.fields?.Priority) return issue.fields.Priority;

    // fallback if API returns singleSelect format
    if (issue.fieldValues) {
        const p = issue.fieldValues.find(f =>
            f.field?.name?.toLowerCase() === "priority"
        );
        if (p?.value) return p.value;
    }

    // fallback labels
    if (issue.labels) {
        for (let l of issue.labels) {
            const n = l.name.toLowerCase();
            if (["low","medium","high","urgent"].includes(n)) {
                return n;
            }
        }
    }

    return "low";
}

/* ---------------- RENDER ---------------- */

function render() {

    const filtered = selectedUser
        ? allIssues.filter(i =>
            i.assignee?.login === selectedUser ||
            i.user?.login === selectedUser
          )
        : allIssues;

    document.getElementById("stats").innerHTML = `
        <div class="stat">Total<br>${filtered.length}</div>
        <div class="stat">Open<br>${filtered.filter(i => !i.closed_at).length}</div>
        <div class="stat">Closed<br>${filtered.filter(i => i.closed_at).length}</div>
    `;

    const users = [...new Set(allIssues.map(i =>
        i.assignee?.login || i.user?.login
    ))];

    document.getElementById("members").innerHTML = users.map(u => `
        <div class="member ${selectedUser===u?'active':''}" onclick="selectUser('${u}')">
            ${u}
        </div>
    `).join("");

    document.getElementById("issues").innerHTML = filtered.map(i => {

        const priority = getPriority(i);

        return `
        <div class="card">
            <b>${i.title}</b><br>
            <small>${i.body ? i.body.slice(0,120) : ""}</small>
            <br><br>

            <span class="badge ${priority}">${priority.toUpperCase()}</span>
            <br><br>

            <a href="${i.html_url}" target="_blank">View</a>
        </div>
        `;
    }).join("");

}

/* ---------------- ACTIONS ---------------- */

function selectUser(user) {
    selectedUser = selectedUser === user ? null : user;
    render();
}

async function loadData() {
    allIssues = await fetchIssues();
    render();
}

/* ---------------- INIT ---------------- */

loadData();

// ❌ NO AUTO REFRESH (you asked for this earlier)
</script>

</body>
</html>
