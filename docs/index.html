<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Team - Issue Tracking Dashboard</title>

    <style>
        /* ===== YOUR ORIGINAL CSS (UNCHANGED) ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 20px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        .stat-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .main-content {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 25px;
            margin-bottom: 40px;
        }

        .team-members {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            position: sticky;
            top: 20px;
        }

        .team-header {
            background: linear-gradient(135deg,#667eea,#764ba2);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .member-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }

        .member-item:hover { background: #f5f5f5; }

        .member-item.active { background: #667eea; color: white; }

        .member-badge {
            background: #667eea;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .milestones {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .milestone-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
        }

        .milestone-header {
            padding: 20px;
            color: white;
        }

        .issue-item {
            padding: 12px;
            background: #f8f9fa;
            margin: 10px;
            border-radius: 8px;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
        }

        .loading {
            color: white;
            text-align: center;
            padding: 40px;
        }
    </style>
</head>

<body>
<div class="container">

<header>
    <h1>🎯 Support Team Dashboard</h1>
    <p class="subtitle">Track issues by team member and priority</p>
</header>

<div id="error"></div>
<div class="stats" id="stats"></div>

<div class="main-content">
    <div class="team-members">
        <div class="team-header">Team Members</div>
        <div id="teamMembers"></div>
    </div>

    <div class="milestones" id="milestones"></div>
</div>

</div>

<script>
const REPO_OWNER = 'Can-We-Fix-It';
const REPO_NAME = 'Support-Team';

/* =========================
   🔐 ADD YOUR GITHUB TOKEN HERE
   =========================
   IMPORTANT:
   - Required for stable API access
   - Use a GitHub Personal Access Token
   - DO NOT expose on public sites if possible
*/
const GITHUB_TOKEN = "PASTE_YOUR_TOKEN_HERE";

/* ========================= */

async function githubFetch(url) {
    const headers = {
        Accept: "application/vnd.github+json"
    };

    // attach token if provided
    if (GITHUB_TOKEN && GITHUB_TOKEN !== "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") {
        headers.Authorization = `Bearer ${GITHUB_TOKEN}`;
    }

    const res = await fetch(url, { headers });

    if (!res.ok) {
        throw new Error(`GitHub API error: ${res.status}`);
    }

    return res.json();
}

/* =========================
   PRIORITY DETECTION
========================= */
function getPriorityFromIssue(issue) {
    if (!issue.labels) return null;

    const labels = issue.labels.map(l => (l.name || "").toLowerCase());

    if (labels.some(l =>
        l.includes('severe') ||
        l.includes('p0') ||
        l.includes('p1') ||
        l.includes('high') ||
        l.includes('urgent')
    )) return 'Severe';

    if (labels.some(l =>
        l.includes('medium') ||
        l.includes('p2')
    )) return 'Medium';

    if (labels.some(l =>
        l.includes('low') ||
        l.includes('p3')
    )) return 'Low';

    return null;
}

/* ========================= */

async function load() {
    try {
        document.getElementById("milestones").innerHTML =
            '<div class="loading">Loading...</div>';

        const milestones = await githubFetch(
            `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/milestones?state=all`
        );

        let html = "";

        for (let m of milestones) {

            const issues = await githubFetch(
                `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues?milestone=${m.number}&state=all`
            );

            let issuesHTML = "";

            for (let i of issues) {
                const priority = getPriorityFromIssue(i);

                issuesHTML += `
                    <div class="issue-item">
                        <b>${i.title}</b><br>
                        Priority: ${priority || "None"}
                    </div>
                `;
            }

            html += `
                <div class="milestone-card">
                    <div class="milestone-header">
                        <h3>${m.title}</h3>
                    </div>
                    ${issuesHTML}
                </div>
            `;
        }

        document.getElementById("milestones").innerHTML = html;

    } catch (err) {
        document.getElementById("milestones").innerHTML =
            `<div class="error">Error: ${err.message}</div>`;
    }
}

load();
</script>

</body>
</html>
