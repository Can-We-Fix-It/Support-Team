<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Team Dashboard (Cached)</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial;
    background: linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    padding:15px;
}

.container { max-width:1200px; margin:0 auto; }

header {
    text-align:center;
    color:white;
    margin-bottom:25px;
}

h1 { font-size:2.2em; }
.subtitle { opacity:0.9; }

.stats {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:10px;
    margin-bottom:15px;
}

#monthFilters {
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.month-btn {
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
    background:white;
    color:black;
    font-size:13px;
    transition:0.2s;
}

.month-btn.active { background:#111; color:white; }

.stat-box {
    background:white;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

.stat-number {
    font-size:1.8em;
    color:#667eea;
    font-weight:bold;
}

.main-content {
    display:grid;
    grid-template-columns:260px 1fr;
    gap:15px;
}

.team-members {
    background:white;
    border-radius:12px;
    padding:8px;
    height:fit-content;
    position:sticky;
    top:10px;
}

.member-item {
    padding:10px;
    border-bottom:1px solid #eee;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
}

.member-item.active { background:#667eea; color:white; }

.milestone-card {
    background:white;
    border-radius:12px;
    margin-bottom:15px;
    overflow:hidden;
}

.milestone-header {
    padding:12px;
    color:white;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

.badge {
    padding:3px 8px;
    border-radius:12px;
    font-size:0.7em;
    margin-right:5px;
}

.priority-low { background:#44aa44; color:white; }
.priority-medium { background:#ffaa00; color:white; }
.priority-severe { background:#ff4444; color:white; }

.agent-tag {
    background:#111;
    color:white;
    padding:3px 8px;
    border-radius:12px;
    font-size:0.7em;
}

.issue-item { padding:12px; }

.description-label {
    font-weight:600;
    margin-bottom:5px;
}

.description-text {
    white-space:pre-wrap;
    line-height:1.5;
    color:#222;
}

.meta {
    font-size:0.85em;
    color:#666;
    margin-top:4px;
}

a { color:#667eea; text-decoration:none; }

.refresh-btn {
    margin-top:10px;
    padding:8px 12px;
    border-radius:8px;
    border:none;
    cursor:pointer;
    background:white;
}

@media (max-width:900px){
    .main-content{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="container">

<header>
<h1>🎯 Support Dashboard</h1>
<p class="subtitle">Cached GitHub Issues (No Rate Spam)</p>
<button class="refresh-btn" onclick="forceRefresh()">🔄 Refresh Now</button>
</header>

<div class="stats" id="stats"></div>
<div id="monthFilters"></div>

<div class="main-content">
    <div class="team-members" id="teamMembers"></div>
    <div id="milestones"></div>
</div>

</div>

<script>

const OWNER = "Can-We-Fix-It";
const REPO = "Support-Team";

const CACHE_KEY = "support_dashboard_cache_v1";

let allData = [];
let selectedAgent = null;
let selectedMonth = null;

/* =========================
   CACHE SYSTEM
========================= */

function saveCache(data) {
    localStorage.setItem(CACHE_KEY, JSON.stringify({
        timestamp: Date.now(),
        data
    }));
}

function loadCache() {
    const cached = localStorage.getItem(CACHE_KEY);
    if (!cached) return null;

    return JSON.parse(cached);
}

/* =========================
   FETCH (ONLY WHEN NEEDED)
========================= */

async function fetchData(force = false) {

    const cached = loadCache();

    // ✅ use cache instantly if exists
    if (cached && !force) {
        allData = cached.data;
        render();
        return;
    }

    try {
        const res = await fetch(
            `https://api.github.com/repos/${OWNER}/${REPO}/issues?state=all&per_page=100`
        );

        const issues = await res.json();
        if (!Array.isArray(issues)) return;

        allData = issues;
        saveCache(issues);
        render();

    } catch (err) {
        console.log("Error:", err);
    }
}

/* =========================
   MANUAL REFRESH ONLY
========================= */
function forceRefresh() {
    fetchData(true);
}

/* =========================
   LOGIC (UNCHANGED)
========================= */

function getPriority(issue) {
    const labels = issue.labels?.map(l => l.name) || [];
    if (labels.includes("Severe")) return "Severe";
    if (labels.includes("Medium")) return "Medium";
    return "Low";
}

function getAgent(issue) {
    const labels = issue.labels?.map(l => l.name) || [];
    const priorityLabels = ["Severe", "Medium", "Low"];
    return labels.find(l => !priorityLabels.includes(l)) || "Unassigned";
}

function getMonth(issue) {
    const labels = issue.labels?.map(l => l.name.toLowerCase()) || [];
    const dateLabel = labels.find(l => l.startsWith("date-"));
    if (!dateLabel) return "unknown";

    const parts = dateLabel.replace("date-", "").split("-");
    return parts[1].charAt(0).toUpperCase() + parts[1].slice(1);
}

function getRaisedFull(issue) {
    const labels = issue.labels?.map(l => l.name) || [];
    const dateLabel = labels.find(l => l.startsWith("date-"));
    if (!dateLabel) return "Not set";

    const parts = dateLabel.replace("date-", "").split("-");
    return `${parts[0]} ${parts[1]} ${parts[2]}`;
}

/* =========================
   FILTERS
========================= */

function selectAgent(agent) {
    selectedAgent = selectedAgent === agent ? null : agent;
    render();
}

function selectMonth(month) {
    selectedMonth = selectedMonth === month ? null : month;
    render();
}

/* =========================
   RENDER
========================= */

function render() {

    let display = allData;

    if (selectedAgent) {
        display = display.filter(i => getAgent(i) === selectedAgent);
    }

    if (selectedMonth) {
        display = display.filter(i => getMonth(i) === selectedMonth);
    }

    document.getElementById("stats").innerHTML = `
        <div class="stat-box">
            <div class="stat-number">${display.length}</div>
            <div>Total Issues</div>
        </div>
    `;

    const months = [...new Set(allData.map(getMonth).filter(m => m !== "unknown"))];

    document.getElementById("monthFilters").innerHTML =
        `<div class="month-btn ${!selectedMonth ? 'active' : ''}" onclick="selectMonth(null)">All</div>` +
        months.map(m =>
            `<div class="month-btn ${selectedMonth === m ? 'active' : ''}" onclick="selectMonth('${m}')">${m}</div>`
        ).join("");

    const grouped = {};
    display.forEach(i => {
        const a = getAgent(i);
        if (!grouped[a]) grouped[a] = [];
        grouped[a].push(i);
    });

    let teamHTML = "";
    Object.keys(grouped).sort().forEach(agent => {
        teamHTML += `
            <div class="member-item ${selectedAgent === agent ? 'active' : ''}"
                 onclick="selectAgent('${agent}')">
                <div>${agent}</div>
                <div>${grouped[agent].length}</div>
            </div>
        `;
    });

    document.getElementById("teamMembers").innerHTML = teamHTML;

    let html = "";

    display.forEach(issue => {

        const priority = getPriority(issue);
        const agent = getAgent(issue);
        const description = issue.body || "No description provided.";

        html += `
        <div class="milestone-card">

            <div class="milestone-header">
                <div>#${issue.number} ${issue.title}</div>
                <div style="margin-top:8px;">
                    <span class="badge priority-${priority.toLowerCase()}">${priority}</span>
                    <span class="agent-tag">${agent}</span>
                </div>
            </div>

            <div class="issue-item">

                <div class="description-label">Description:</div>
                <div class="description-text">${description}</div>

                <div class="meta">Created: ${new Date(issue.created_at).toLocaleDateString()}</div>
                <div class="meta">📅 Raised: ${getRaisedFull(issue)}</div>
                <div class="meta">Updated: ${new Date(issue.updated_at).toLocaleDateString()}</div>

                <div class="meta" style="margin-top:10px;">
                    <a href="${issue.html_url}" target="_blank">View on GitHub →</a>
                </div>

            </div>

        </div>`;
    });

    document.getElementById("milestones").innerHTML = html;
}

/* INIT */
fetchData();

</script>

</body>
</html>
