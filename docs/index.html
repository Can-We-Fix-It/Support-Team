<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Team Dashboard</title>

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial;
    background: linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    padding:15px;
}

.container {
    max-width:1200px;
    margin:0 auto;
}

header {
    text-align:center;
    color:white;
    margin-bottom:20px;
}

h1 { font-size:2.2em; }
.subtitle { opacity:0.9; }

.controls {
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:15px;
}

button {
    padding:8px 12px;
    border-radius:8px;
    border:none;
    cursor:pointer;
    background:white;
}

.stats {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:10px;
    margin-bottom:15px;
}

.stat-box {
    background:white;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

.stat-number {
    font-size:1.8em;
    color:#667eea;
    font-weight:bold;
}

#monthFilters, #priorityFilters {
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:15px;
}

.filter-btn {
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
    background:white;
    font-size:13px;
}

.filter-btn.active {
    background:#111;
    color:white;
}

.main-content {
    display:grid;
    grid-template-columns:260px 1fr;
    gap:15px;
}

.team-members {
    background:white;
    border-radius:12px;
    padding:8px;
    height:fit-content;
}

@media (min-width: 901px) {
    .team-members {
        position: sticky;
        top: 10px;
    }
}

.member-item {
    padding:10px;
    border-bottom:1px solid #eee;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
    font-size:0.9em;
}

.member-item:hover {
    background:#f5f5f5;
}

.member-item.active {
    background:#667eea;
    color:white;
}

.milestone-card {
    background:white;
    border-radius:12px;
    margin-bottom:15px;
    overflow:hidden;
}

.milestone-header {
    padding:12px;
    color:white;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

.description-label {
    font-weight:600;
    margin-bottom:5px;
}

.description-text {
    white-space:pre-wrap;
    line-height:1.5;
    color:#222;
}

.meta {
    font-size:0.85em;
    color:#666;
    margin-top:4px;
}

.badge {
    padding:3px 8px;
    border-radius:12px;
    font-size:0.7em;
}

.priority-low { background:#44aa44; color:white; }
.priority-medium { background:#ffaa00; color:white; }
.priority-high { background:#ff8800; color:white; }
.priority-severe { background:#ff4444; color:white; }

@media print {
    body {
        background:white;
        padding:0;
    }

    header,
    .controls,
    #monthFilters,
    #priorityFilters,
    .stats,
    .team-members {
        display:none !important;
    }

    .milestone-card {
        break-inside: avoid;
    }
}
</style>
</head>

<body>

<div class="container">

<header>
<h1>🎯 Support Dashboard</h1>
<p class="subtitle">GitHub Issues Tracking</p>
</header>

<div class="controls">
    <button onclick="window.print()">🖨 Print</button>
    <button onclick="forceRefresh()">🔄 Refresh</button>
</div>

<div class="stats" id="stats"></div>

<div id="monthFilters"></div>
<div id="priorityFilters"></div>

<div class="main-content">
    <div class="team-members" id="teamMembers"></div>
    <div id="milestones"></div>
</div>

</div>

<script>

const OWNER = "Can-We-Fix-It";
const REPO = "Support-Team";
const CACHE_KEY = "dash_v1_fix";

let allData = [];
let selectedMonth = null;
let selectedPriority = null;
let selectedAgent = null;

/* CACHE */
function saveCache(data){
    localStorage.setItem(CACHE_KEY, JSON.stringify(data));
}
function loadCache(){
    const c = localStorage.getItem(CACHE_KEY);
    return c ? JSON.parse(c) : null;
}

/* FETCH */
async function fetchData(force=false){

    const cached = loadCache();

    if(cached && !force){
        allData = cached;
        render();
        return;
    }

    const res = await fetch(
        `https://api.github.com/repos/${OWNER}/${REPO}/issues?state=all&per_page=100`
    );

    const data = await res.json();
    allData = data;
    saveCache(data);
    render();
}

/* DATE PARSE */
function extractDate(title){
    const regex = /(\d{1,2})(st|nd|rd|th)?\s+([A-Za-z]+)\s+(\d{4})/;
    const m = title.match(regex);

    if(!m) return null;

    return {
        full: `${m[1]} ${m[3]} ${m[4]}`,
        month: m[3],
        cleanTitle: title.replace(regex,'').trim()
    };
}

/* FILTER TOGGLE FIXED */
function toggleMonth(m){
    selectedMonth = (selectedMonth === m) ? null : m;
    render();
}

function togglePriority(p){
    selectedPriority = (selectedPriority === p) ? null : p;
    render();
}

function toggleAgent(a){
    selectedAgent = (selectedAgent === a) ? null : a;
    render();
}

/* LOGIC */
function getPriority(issue){
    const labels = issue.labels?.map(l=>l.name.toLowerCase()) || [];

    if(labels.includes("severe")) return "Severe";
    if(labels.includes("high")) return "High";
    if(labels.includes("medium")) return "Medium";
    return "Low";
}

function getAgent(issue){
    const labels = issue.labels?.map(l=>l.name) || [];
    const skip = ["Severe","High","Medium","Low"];
    return labels.find(l => !skip.includes(l)) || "Unassigned";
}

function getMonth(issue){
    const d = extractDate(issue.title);
    return d ? d.month : "unknown";
}

/* RENDER */
function render(){

    let data = allData;

    if(selectedAgent){
        data = data.filter(i => getAgent(i) === selectedAgent);
    }

    if(selectedMonth){
        data = data.filter(i => getMonth(i) === selectedMonth);
    }

    if(selectedPriority){
        data = data.filter(i => getPriority(i) === selectedPriority);
    }

    document.getElementById("stats").innerHTML = `
        <div class="stat-box">
            <div class="stat-number">${data.length}</div>
            <div>Total Issues</div>
        </div>
    `;

    /* MONTHS */
    const months = [...new Set(allData.map(getMonth).filter(m=>m!=="unknown"))];

    document.getElementById("monthFilters").innerHTML =
        `<div class="filter-btn ${!selectedMonth?'active':''}" onclick="toggleMonth(null)">All Months</div>`
        + months.map(m =>
            `<div class="filter-btn ${selectedMonth===m?'active':''}" onclick="toggleMonth('${m}')">${m}</div>`
        ).join("");

    /* PRIORITY */
    const priorities = ["Low","Medium","High","Severe"];

    document.getElementById("priorityFilters").innerHTML =
        `<div class="filter-btn ${!selectedPriority?'active':''}" onclick="togglePriority(null)">All Priority</div>`
        + priorities.map(p =>
            `<div class="filter-btn ${selectedPriority===p?'active':''}" onclick="togglePriority('${p}')">${p}</div>`
        ).join("");

    /* AGENTS */
    const grouped = {};
    data.forEach(i=>{
        const a = getAgent(i);
        if(!grouped[a]) grouped[a]=[];
        grouped[a].push(i);
    });

    let teamHTML = "";
    Object.keys(grouped).sort().forEach(agent=>{
        teamHTML += `
            <div class="member-item ${selectedAgent===agent?'active':''}"
                 onclick="toggleAgent('${agent}')">
                <div>${agent}</div>
                <div>${grouped[agent].length}</div>
            </div>
        `;
    });

    document.getElementById("teamMembers").innerHTML = teamHTML;

    /* CARDS */
    let html = "";

    data.forEach(issue=>{

        const parsed = extractDate(issue.title);

        const title = parsed ? parsed.cleanTitle : issue.title;
        const raised = parsed ? parsed.full : "Not set";

        html += `
        <div class="milestone-card">

            <div class="milestone-header">
                <div>#${issue.number} ${title}</div>
            </div>

            <div class="issue-item">
                <div class="description-label">Description:</div>
                <div class="description-text">${issue.body || "No description"}</div>
                <div class="meta">📅 Raised: ${raised}</div>
            </div>

        </div>`;
    });

    document.getElementById("milestones").innerHTML = html;
}

fetchData();

</script>

</body>
</html>
